<script>
// ── School schedule ────────────────────────────────────────────────────────
const SCHOOL_SCHEDULE = [
  { label:'Tutor Group', start:'08:50', end:'09:00' },
  { label:'Period 1',    start:'09:03', end:'09:53', period:1 },
  { label:'Period 2',    start:'09:56', end:'10:46', period:2 },
  { label:'Recess',      start:'10:46', end:'11:06', break:'Recess' },
  { label:'Period 3',    start:'11:10', end:'12:00', period:3 },
  { label:'Period 4',    start:'12:03', end:'12:53', period:4 },
  { label:'Lunch',       start:'12:53', end:'13:33', break:'Lunch' },
  { label:'Period 5',    start:'13:37', end:'14:27', period:5 },
  { label:'Period 6',    start:'14:30', end:'15:20', period:6 },
];
function timeToMinutes(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function nowMinutes(){const n=new Date();return n.getHours()*60+n.getMinutes()+n.getSeconds()/60;}
function getCurrentAndNext(){const nm=nowMinutes();let current=null,next=null;for(const slot of SCHOOL_SCHEDULE){const s=timeToMinutes(slot.start),e=timeToMinutes(slot.end);if(nm>=s&&nm<e)current=slot;else if(nm<s&&!next)next=slot;}return{current,next};}
function getRoomForPeriod(slots,periodNum){if(!periodNum||!slots[periodNum]||!slots[periodNum].length)return null;return slots[periodNum][0].d2||slots[periodNum][0].d1||null;}
function getTileStatus(slots){const{current,next}=getCurrentAndNext();function resolveSlot(slot){if(!slot)return null;if(slot.break)return slot.break;if(slot.label==='Tutor Group')return'Tutor';if(!slot.period)return null;const room=getRoomForPeriod(slots,slot.period);return room||null;}return{nowText:resolveSlot(current),nextText:resolveSlot(next)};}

let tileRefreshTimer=null;
function startTileRefresh(){if(tileRefreshTimer)clearInterval(tileRefreshTimer);tileRefreshTimer=setInterval(()=>{if(currentGroupMap)renderTiles(currentGroupMap,currentNames);},30000);}

// ── Period strip ──────────────────────────────────────────────────────────
function formatTime12(t){const[h,m]=t.split(':').map(Number);return`${h%12||12}:${String(m).padStart(2,'0')}${h>=12?'pm':'am'}`;}
function formatCountdown(secsRemaining){const s=Math.max(0,Math.round(secsRemaining));const m=Math.floor(s/60),r=s%60;if(m===0)return`${r}s`;return`${m}m ${String(r).padStart(2,'0')}s`;}
function updateStrip(){const strip=document.getElementById('periodStrip');const tileVisible=document.getElementById('tileView').classList.contains('visible');if(isWeekend||!tileVisible){strip.classList.remove('visible');return;}const now2=new Date();const nmSecs=now2.getHours()*3600+now2.getMinutes()*60+now2.getSeconds();const schoolStartSecs=timeToMinutes('08:40')*60;const schoolEndSecs=timeToMinutes('15:30')*60;if(nmSecs<schoolStartSecs||nmSecs>schoolEndSecs){strip.classList.remove('visible');return;}strip.classList.add('visible');let current=null,next=null;for(const slot of SCHOOL_SCHEDULE){const s=timeToMinutes(slot.start)*60;const e=timeToMinutes(slot.end)*60;if(nmSecs>=s&&nmSecs<e)current={...slot,startSecs:s,endSecs:e};else if(nmSecs<s&&!next)next={...slot,startSecs:s,endSecs:e};}const dot=document.getElementById('stripDot');const nameEl=document.getElementById('stripName');const timeEl=document.getElementById('stripTime');const bar=document.getElementById('stripBar');const countdown=document.getElementById('stripCountdown');const nextEl=document.getElementById('stripNext');if(current){const isBreak=!!current.break;const remaining=current.endSecs-nmSecs;const total=current.endSecs-current.startSecs;const pct=Math.min(100,((nmSecs-current.startSecs)/total)*100);dot.className='period-strip-dot'+(isBreak?' is-break':'');nameEl.textContent=current.label;timeEl.textContent=`${formatTime12(current.start)} – ${formatTime12(current.end)}`;bar.style.width=pct+'%';bar.className='period-strip-bar'+(isBreak?' is-break':'');countdown.textContent=formatCountdown(remaining)+' left';}else{dot.className='period-strip-dot is-break';nameEl.textContent='Between periods';timeEl.textContent='';bar.style.width='0%';bar.className='period-strip-bar is-break';const until=next?(next.startSecs-nmSecs):0;countdown.textContent=next?formatCountdown(until)+' until':'';}if(next){nextEl.innerHTML=`Next: <strong>${next.label}</strong> ${formatTime12(next.start)}`;}else{nextEl.textContent='Last period done';}}
let stripTimer=null;
function startStrip(){updateStrip();if(stripTimer)clearInterval(stripTimer);stripTimer=setInterval(updateStrip,1000);}

// ── Cycle ──────────────────────────────────────────────────────────────────
const CYCLE_START = new Date('2026-02-23T00:00:00');
function getTodayDayNumber(){const today=new Date();today.setHours(0,0,0,0);const start=new Date(CYCLE_START);start.setHours(0,0,0,0);let count=0;const d=new Date(start);while(d<=today){if(d.getDay()!==0&&d.getDay()!==6)count++;d.setDate(d.getDate()+1);}return count>0?((count-1)%10)+1:null;}
const DAYS_LONG=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const now=new Date();const dow=now.getDay();const isWeekend=dow===0||dow===6;const dayNum=getTodayDayNumber();
const siteTitle=document.getElementById('siteTitle');const siteSub=document.getElementById('siteSubtitle');
if(!isWeekend&&dayNum){siteTitle.textContent=`Timetable (Day ${dayNum})`;siteSub.textContent=DAYS_LONG[dow]+' · '+now.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
else{siteTitle.textContent='Timetable';siteSub.textContent=DAYS_LONG[dow]+' · '+now.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}

// ── Theme ──────────────────────────────────────────────────────────────────
const html=document.documentElement;const savedTheme=localStorage.getItem('tt-theme')||'light';html.setAttribute('data-theme',savedTheme);document.getElementById('toggleLabel').textContent=savedTheme==='dark'?'Dark':'Light';
document.getElementById('themeToggle').addEventListener('click',()=>{const next=html.getAttribute('data-theme')==='dark'?'light':'dark';html.setAttribute('data-theme',next);document.getElementById('toggleLabel').textContent=next==='dark'?'Dark':'Light';localStorage.setItem('tt-theme',next);});

// ── Compact toggle ─────────────────────────────────────────────────────────
let isCompact=localStorage.getItem('tt-compact')==='true';
function applyCompactMode(){const grid=document.getElementById('tileGrid');const btn=document.getElementById('viewToggleBtn');if(isCompact){grid.classList.add('compact');btn.textContent='⊟ Expanded';}else{grid.classList.remove('compact');btn.textContent='⊞ Compact';}}
document.getElementById('viewToggleBtn').addEventListener('click',()=>{isCompact=!isCompact;localStorage.setItem('tt-compact',isCompact);applyCompactMode();});
applyCompactMode();

// ── Server ─────────────────────────────────────────────────────────────────
function getServerUrl(){return'https://timetable-server-r6nb.onrender.com';}
document.getElementById('connectBtn').addEventListener('click',()=>{const url=document.getElementById('serverUrlInput').value.trim().replace(/\/$/,'');if(!url)return;localStorage.setItem('tt-viewer-server',url);loadTimetable();});

// ── Helpers ────────────────────────────────────────────────────────────────
function getLuminance(c){const n=(c||'').match(/\d+/g);return(!n||n.length<3)?999:0.299*+n[0]+0.587*+n[1]+0.114*+n[2];}
function escapeHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── LSO name helpers ──────────────────────────────────────────────────────
function getLSONames(){try{return JSON.parse(localStorage.getItem('tt-lso-names')||'{}');}catch(e){return{};}}
function saveLSONames(obj){localStorage.setItem('tt-lso-names',JSON.stringify(obj));}
function getLSONameForKey(key){const names=getLSONames();return names[key]||localStorage.getItem('lso-name')||'Mr. Chew';}
function getToday_ddmmyy(){const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;}
function getEmailOverrides(){try{return JSON.parse(localStorage.getItem('tt-email-overrides')||'{}');}catch(e){return{};}}
function codeToEmailPrefix(code,overrides){const upper=code.toUpperCase().trim();if(overrides[upper])return{prefix:overrides[upper],isOverride:true};const lower=upper.toLowerCase();return{prefix:lower[lower.length-1]+lower.slice(0,lower.length-1),isOverride:false};}
function buildLSOEmail(slots,lsoSettings,dcChanges){
  // dcChanges: array of {lso,period,type,description,classCode,room,teacherCode} for this person
  const{domain,yourName,cc}=lsoSettings;
  const overrides=getEmailOverrides();
  const dd=getToday_ddmmyy();
  const subject=`LSO ${dd}`;
  const periodLines=[];
  const teacherMap=new Map();

  // Build a lookup of DC changes by period for quick access
  const dcByPeriod={};
  (dcChanges||[]).forEach(ch=>{
    const pNum=parseInt((ch.period||'').replace('p',''),10);
    if(pNum>=1&&pNum<=6){
      if(!dcByPeriod[pNum])dcByPeriod[pNum]=[];
      dcByPeriod[pNum].push(ch);
    }
  });

  for(let p=1;p<=6;p++){
    const dcForPeriod=dcByPeriod[p]||[];
    const entries=slots[p];

    if(dcForPeriod.length>0){
      // Use DC data — one line per change
      dcForPeriod.forEach(ch=>{
        const d1=ch.classCode||ch.description||'';
        const d2=ch.room||'';
        const d3=ch.teacherCode||'';
        periodLines.push(`P${p} - ${d1}   ${d2}   ${d3}`.trimEnd());
        if(d3){
          const code=d3.trim().toUpperCase();
          if(!teacherMap.has(code))teacherMap.set(code,codeToEmailPrefix(code,overrides));
        }
      });
    } else if(entries&&entries.length>0){
      // No DC change — use original timetable data
      entries.forEach(({d1,d2,d3})=>{
        if(d1||d2||d3){
          periodLines.push(`P${p} - ${d1||''}   ${d2||''}   ${d3||''}`.trimEnd());
          if(d3){
            const code=d3.trim().toUpperCase();
            if(!teacherMap.has(code))teacherMap.set(code,codeToEmailPrefix(code,overrides));
          }
        }
      });
    }
  }

  const teacherEntries=[...teacherMap.entries()];
  const teacherEmails=teacherEntries.map(([code,{prefix}])=>`${prefix}@${domain}`);
  const body=['Good morning teachers,','','Today I will be attending and supporting the students within your classes.','',...periodLines,'',`Please introduce me to the students as ${yourName}.`,'I look forward to working with you today and providing effective support to our students.].join('\n');
  return{subject,body,teacherEmails,teacherEntries,cc};
}
function getLSOSettings(key){return{domain:localStorage.getItem('lso-domain')||'stpeters.vic.edu.au',yourName:getLSONameForKey(key),cc:localStorage.getItem('lso-cc')||'kmcmellon@stpeters.vic.edu.au'};}
function saveLSOGlobalSettings(s){localStorage.setItem('lso-domain',s.domain);localStorage.setItem('lso-cc',s.cc);}

// ── State ──────────────────────────────────────────────────────────────────
let currentGroupMap=null,currentNames={},activeDetailKey=null;
function showScreen(id){['loadingState','emptyState','noServerState','tileView','detailView'].forEach(s=>{const el=document.getElementById(s);el.style.display='none';el.classList.remove('visible');});document.getElementById('serverSetup').classList.toggle('visible',id==='noServerState');const target=document.getElementById(id);target.style.display='';requestAnimationFrame(()=>target.classList.add('visible'));if(id==='tileView'){startTileRefresh();startStrip();}else{document.getElementById('periodStrip').classList.remove('visible');}}
const backBtn=document.getElementById('backBtn');
function goHome(){activeDetailKey=null;backBtn.classList.remove('visible');siteTitle.textContent=dayNum&&!isWeekend?`Timetable (Day ${dayNum})`:'Timetable';showScreen('tileView');}
function openDetail(key){if(!currentGroupMap)return;const grp=currentGroupMap.get(key);if(!grp)return;const name=currentNames[key]||'—';activeDetailKey=key;siteTitle.textContent=name;backBtn.classList.add('visible');renderDetail(key,grp,name);showScreen('detailView');window.scrollTo({top:0,behavior:'smooth'});}
backBtn.addEventListener('click',goHome);

// ── Load timetable ─────────────────────────────────────────────────────────
async function loadTimetable(){const url=getServerUrl();if(!url){showScreen('noServerState');return;}showScreen('loadingState');try{const res=await fetch(`${url}/timetable`);if(res.status===404){showScreen('emptyState');return;}if(!res.ok){showScreen('emptyState');return;}const state=await res.json();if(!state.map){showScreen('emptyState');return;}const groupMap=new Map();for(const[k,v]of Object.entries(state.map))groupMap.set(k,v);currentGroupMap=groupMap;currentNames=state.names||{};try{localStorage.setItem('tt-cached-data',JSON.stringify(state));localStorage.setItem('tt-cached-time',Date.now().toString());}catch(e){}renderTiles(groupMap,currentNames);loadDailyChanges();if(activeDetailKey&&groupMap.has(activeDetailKey)){const grp=groupMap.get(activeDetailKey);const name=currentNames[activeDetailKey]||'—';siteTitle.textContent=name;backBtn.classList.add('visible');renderDetail(activeDetailKey,grp,name);showScreen('detailView');}else{activeDetailKey=null;showScreen('tileView');}}catch(e){const cached=localStorage.getItem('tt-cached-data');const cachedTime=parseInt(localStorage.getItem('tt-cached-time')||'0');const ageHours=(Date.now()-cachedTime)/3600000;if(cached&&ageHours<20){try{const state=JSON.parse(cached);const groupMap=new Map();for(const[k,v]of Object.entries(state.map))groupMap.set(k,v);currentGroupMap=groupMap;currentNames=state.names||{};renderTiles(groupMap,currentNames);if(activeDetailKey&&groupMap.has(activeDetailKey)){const grp=groupMap.get(activeDetailKey);const name=currentNames[activeDetailKey]||'—';siteTitle.textContent=name;backBtn.classList.add('visible');renderDetail(activeDetailKey,grp,name);showScreen('detailView');}else{activeDetailKey=null;showScreen('tileView');}showStaleBanner();return;}catch(e2){}}showScreen('noServerState');}}
function showStaleBanner(){if(document.getElementById('staleBanner'))return;const b=document.createElement('div');b.id='staleBanner';b.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#b45309;color:#fff;padding:10px 20px;border-radius:10px;font-size:0.82rem;font-family:Outfit,sans-serif;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.3);';b.textContent='⚠️ Showing cached data — server unreachable';document.body.appendChild(b);setTimeout(()=>b.remove(),6000);}
document.getElementById('refreshBtn').addEventListener('click',loadTimetable);
setInterval(loadTimetable,600000);

// ── ?user= deep-link: open a specific person's timetable directly ──────────
(function checkUserParam(){
  const params = new URLSearchParams(window.location.search);
  const deepUser = params.get('user');
  if (!deepUser) return;

  // Try to resolve the Windows username to a display name via lso-settings,
  // then fall back to the raw username if the server has nothing stored.
  function tryOpenForName(displayName) {
    const lower = displayName.toLowerCase().trim();
    if (!currentGroupMap) return false;
    for (const [key, grp] of currentGroupMap.entries()) {
      const n = (currentNames[key]||'').toLowerCase();
      if (n === lower || n.replace(/\s+/g,'') === lower.replace(/\s+/g,'')) {
        setTimeout(() => openDetail(key), 80);
        return true;
      }
    }
    return false;
  }

  // Observer fires each time tiles are rendered
  const observer = new MutationObserver(() => {
    if (!currentGroupMap) return;
    // First try the raw username in case it happens to match
    if (tryOpenForName(deepUser)) { observer.disconnect(); return; }
    // Otherwise fetch stored display name from server and try that
    fetch(getServerUrl() + '/lso-settings?user=' + encodeURIComponent(deepUser))
      .then(r => r.ok ? r.json() : {})
      .then(s => {
        const displayName = (s && s.name) ? s.name : deepUser;
        if (tryOpenForName(displayName)) observer.disconnect();
      })
      .catch(() => {});
  });
  observer.observe(document.getElementById('tileGrid'), { childList: true });
})();

// ── Daily Changes (Toggle) ─────────────────────────────────────────────────
let dcExpanded=false;
document.getElementById('dcToggleRow').addEventListener('click',()=>{dcExpanded=!dcExpanded;document.getElementById('dcTableWrap').style.display=dcExpanded?'':'none';document.getElementById('dcChevron').textContent=dcExpanded?'▲ hide':'▼ show';});

async function loadDailyChanges(){const url=getServerUrl();if(!url)return;try{const res=await fetch(`${url}/daily-changes`);if(!res.ok){document.getElementById('dailyChangesPanel').style.display='none';return;}const data=await res.json();renderDailyChanges(data);if(mainView==='map')renderMapView();}catch(e){document.getElementById('dailyChangesPanel').style.display='none';}}

let currentDailyChanges=null;

// ── Normalise DC data (handles both old lsos format and new changes[] format) ──
function normaliseDC(data){
  if(!data)return null;
  // Already new format
  if(data.changes)return{...data,absent:(data.absent||[]).map(a=>typeof a==='string'?{name:a,periods:null}:a)};
  // Convert old lsos format
  const changes=[];
  const lsos=data.lsos||{};
  Object.entries(lsos).forEach(([name,periods])=>{
    ['p1','p2','p3','p4','p5','p6'].forEach(p=>{
      if(periods[p])changes.push({lso:name,period:p,type:'other',description:periods[p],classCode:null,room:null,teacherCode:null});
    });
  });
  const absent=(data.absent||[]).map(a=>typeof a==='string'?{name:a,periods:null}:a);
  return{...data,absent,changes};
}

// ── getDcLookup: by lso name → { name, changes[], absentPeriods } ──────────
function getDcLookup(){
  if(!currentDailyChanges)return{};
  const dc=normaliseDC(currentDailyChanges);
  const lookup={};
  (dc.changes||[]).forEach(ch=>{
    const key=(ch.lso||'').toLowerCase();
    if(!lookup[key])lookup[key]={name:ch.lso,changes:[],absentPeriods:null};
    lookup[key].changes.push(ch);
  });
  (dc.absent||[]).forEach(a=>{
    const key=(a.name||'').toLowerCase();
    if(!lookup[key])lookup[key]={name:a.name,changes:[],absentPeriods:null};
    lookup[key].absentPeriods=a.periods&&a.periods.length?a.periods:'all';
  });
  return lookup;
}

// ── renderDailyChanges ────────────────────────────────────────────────────
function renderDailyChanges(data){
  currentDailyChanges=data?normaliseDC(data):null;
  const panel=document.getElementById('dailyChangesPanel');
  const dc=currentDailyChanges;
  if(!dc||(!dc.changes?.length&&!dc.absent?.length)){panel.style.display='none';currentDailyChanges=null;applyChangesToTiles();return;}
  panel.style.display='';

  // Absent pill
  const absentPill=document.getElementById('dcAbsentPill');
  const absentNames=(dc.absent||[]).map(a=>{
    if(!a.periods||a.periods==='all')return a.name;
    const pArr=Array.isArray(a.periods)?a.periods:[a.periods];
    return`${a.name} (${pArr.map(p=>p.toUpperCase()).join('&')})`;
  });
  if(absentNames.length){absentPill.style.display='';absentPill.textContent='⚠ Absent: '+absentNames.join(', ');}
  else absentPill.style.display='none';

  if(dc.date)document.getElementById('dcDatePill').textContent=dc.date;
  const notesEl=document.getElementById('dcNotes');
  if(dc.notes){notesEl.style.display='';notesEl.textContent=dc.notes;}else notesEl.style.display='none';

  // Build overview table grouped by LSO
  const periods=['p1','p2','p3','p4','p5','p6'];
  const allDayAbsent=new Set((dc.absent||[]).filter(a=>!a.periods||a.periods==='all').map(a=>a.name.toLowerCase()));
  const allLsos=new Set([...(dc.changes||[]).map(c=>c.lso),...(dc.absent||[]).map(a=>a.name)]);

  if(!allLsos.size){document.getElementById('dcTable').innerHTML='';return;}

  const ths=`padding:7px 12px;text-align:left;border:1px solid var(--border);font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:var(--soft);`;
  const tds=`padding:6px 10px;border:1px solid var(--border);vertical-align:top;`;

  let html=`<thead><tr><th style="${ths}">LSO</th>${periods.map(p=>`<th style="${ths}">${p.toUpperCase()}</th>`).join('')}</tr></thead><tbody>`;

  allLsos.forEach(lso=>{
    const isAbsent=allDayAbsent.has(lso.toLowerCase());
    const absentEntry=(dc.absent||[]).find(a=>a.name.toLowerCase()===lso.toLowerCase());
    const partialAbsent=absentEntry&&Array.isArray(absentEntry.periods)?new Set(absentEntry.periods):null;
    const rowBg=isAbsent?'background:#fef3c7;':'';
    html+=`<tr style="${rowBg}"><td style="${tds}font-weight:700;">${lso}${isAbsent?' <span style="font-size:.68rem;color:#92400e;">(absent)</span>':''}</td>`;
    html+=periods.map(p=>{
      const chgs=(dc.changes||[]).filter(c=>c.lso===lso&&c.period===p);
      const isPAbsent=partialAbsent&&partialAbsent.has(p);
      if(isPAbsent)return`<td style="${tds}background:#fef3c7;"><span style="font-size:.7rem;color:#92400e;font-style:italic;">absent</span></td>`;
      if(!chgs.length)return`<td style="${tds}"><span style="color:var(--muted);">—</span></td>`;
      const content=chgs.map(ch=>{
        let parts=[];
        if(ch.description)parts.push(`<div style="font-weight:600;font-size:.78rem;">${ch.description}</div>`);
        if(ch.classCode)parts.push(`<div style="font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);">${ch.classCode}</div>`);
        if(ch.room||ch.teacherCode){
          parts.push(`<div style="display:flex;gap:3px;margin-top:2px;">`
            +(ch.room?`<span style="background:#1e40af;color:#fff;border-radius:3px;padding:1px 5px;font-family:'DM Mono',monospace;font-size:.62rem;">${ch.room}</span>`:'')
            +(ch.teacherCode?`<span style="background:#374151;color:#fff;border-radius:3px;padding:1px 5px;font-family:'DM Mono',monospace;font-size:.62rem;">${ch.teacherCode}</span>`:'')
            +`</div>`);
        }
        return parts.join('');
      }).join('<hr style="margin:4px 0;border:none;border-top:1px solid var(--border);">');
      return`<td style="${tds}background:rgba(219,234,254,.25);">${content}</td>`;
    }).join('');
    html+='</tr>';
  });

  html+='</tbody>';
  document.getElementById('dcTable').innerHTML=html;
  applyChangesToTiles();
}

// ── applyChangesToTiles ───────────────────────────────────────────────────
function applyChangesToTiles(){
  document.querySelectorAll('.dc-overlay').forEach(el=>el.remove());
  if(!currentDailyChanges)return;
  const lookup=getDcLookup();
  document.querySelectorAll('.tile[data-name]').forEach(tile=>{
    const tileName=(tile.dataset.name||'').toLowerCase();
    const entry=lookup[tileName];
    if(!entry)return;
    const isAllAbsent=entry.absentPeriods==='all';
    const changeCount=(entry.changes||[]).length;
    const partialAbsent=Array.isArray(entry.absentPeriods)&&entry.absentPeriods.length>0;
    const ribbon=document.createElement('div');
    ribbon.className='dc-overlay';
    ribbon.style.cssText=`position:absolute;top:7px;right:7px;font-family:'DM Mono',monospace;font-size:0.6rem;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:0.04em;pointer-events:none;z-index:2;`;
    if(isAllAbsent){ribbon.style.background='#fef3c7';ribbon.style.color='#92400e';ribbon.style.border='1px solid #fcd34d';ribbon.textContent='ABSENT';}
    else if(partialAbsent){ribbon.style.background='#fef3c7';ribbon.style.color='#92400e';ribbon.style.border='1px solid #fcd34d';ribbon.textContent='ABSENT '+entry.absentPeriods.map(p=>p.toUpperCase()).join('+');}
    else if(changeCount){ribbon.style.background='#dbeafe';ribbon.style.color='#1e40af';ribbon.style.border='1px solid #93c5fd';ribbon.textContent=changeCount+(changeCount===1?' change':' changes');}
    else return;
    if(getComputedStyle(tile).position==='static')tile.style.position='relative';
    tile.appendChild(ribbon);
  });
}

// ── injectDcIntoDetail ────────────────────────────────────────────────────
function injectDcIntoDetail(name){
  if(!currentDailyChanges)return;
  const lookup=getDcLookup();
  const entry=lookup[(name||'').toLowerCase()];
  if(!entry)return;

  const inner=document.getElementById('detailInner');
  if(!inner||inner.querySelector('.dc-detail-block'))return;

  const isAllAbsent=entry.absentPeriods==='all';
  const partialAbsentPeriods=Array.isArray(entry.absentPeriods)?new Set(entry.absentPeriods):null;
  const changes=entry.changes||[];

  // ── Step 1: For each period row, REPLACE cell content with DC data ──────────
  const periodRows=inner.querySelectorAll('.period-row:not(.empty-row)');
  periodRows.forEach(row=>{
    const periodCell=row.querySelector('.cell-period');
    if(!periodCell)return;
    const pKey=periodCell.textContent.trim().toLowerCase(); // "P1" → "p1"
    const rowChanges=changes.filter(c=>c.period===pKey);
    const isPAbsent=partialAbsentPeriods&&partialAbsentPeriods.has(pKey);

    // Remove any previously injected strip
    const next=row.nextElementSibling;
    if(next&&(next.classList.contains('dc-change-strip')||next.classList.contains('dc-absent-strip')))next.remove();

    if(isAllAbsent||isPAbsent){
      // Dim the row and add absent strip below
      row.style.opacity='0.45';
      const strip=document.createElement('div');
      strip.className='dc-absent-strip';
      strip.innerHTML=`<span style="font-weight:700;color:#92400e;font-size:0.78rem;">⚠ Absent this period</span>`;
      row.parentNode.insertBefore(strip,row.nextSibling);
      return;
    }

    if(!rowChanges.length)return;

    // Get the existing cell values (original timetable data)
    const cells=row.querySelectorAll('.cell-data');
    const origD1=cells[0]?cells[0].textContent.trim():'';
    const origD2=cells[1]?cells[1].textContent.trim():'';
    const origD3=cells[2]?cells[2].textContent.trim():'';

    // Use first change (there's normally only one cover per period)
    const ch=rowChanges[0];

    // Only replace if the change has actual room/class data (cover-type changes)
    if(ch.classCode||ch.room||ch.teacherCode){
      // Replace cell 1 (class code / description)
      if(cells[0]){
        cells[0].textContent=ch.classCode||ch.description||origD1;
        cells[0].dataset.copy=ch.classCode||ch.description||origD1;
        cells[0].style.color='#1d4ed8';
        cells[0].style.fontWeight='700';
      }
      // Replace cell 2 (room)
      if(cells[1]){
        cells[1].textContent=ch.room||origD2;
        cells[1].dataset.copy=ch.room||origD2;
        cells[1].style.color='#1d4ed8';
        cells[1].style.fontWeight='700';
      }
      // Replace cell 3 (teacher code)
      if(cells[2]){
        cells[2].textContent=ch.teacherCode||origD3;
        cells[2].dataset.copy=ch.teacherCode||origD3;
        cells[2].style.color='#1d4ed8';
        cells[2].style.fontWeight='700';
      }
      // Highlight the accent bar blue
      const accentBar=row.querySelector('.accent-bar');
      if(accentBar)accentBar.style.background='#1d4ed8';
      // Mark the period number
      periodCell.style.color='#1d4ed8';

      // Add "was:" strip underneath showing original → new
      const strip=document.createElement('div');
      strip.className='dc-change-strip';

      // Build the "was" line from original data
      const origParts=[origD1,origD2,origD3].filter(Boolean);
      const newParts=[ch.classCode,ch.room,ch.teacherCode].filter(Boolean);
      const descPart=ch.description?`<span style="font-weight:600;font-size:0.78rem;color:#1e40af;">${ch.description}</span>`:'';
      const wasPart=origParts.length?`<span style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);">was: ${origParts.join(' · ')}</span>`:'';

      strip.innerHTML=`
        <span style="font-family:'DM Mono',monospace;font-size:0.65rem;font-weight:700;background:#1d4ed8;color:#fff;border-radius:3px;padding:2px 7px;flex-shrink:0;">📌 CHANGE</span>
        ${descPart}
        ${wasPart}
      `;
      row.parentNode.insertBefore(strip,row.nextSibling);

    } else {
      // No room data (LEC, MacqLit, etc.) — just add a note strip, don't replace cells
      const strip=document.createElement('div');
      strip.className='dc-change-strip';
      strip.innerHTML=`
        <span style="font-family:'DM Mono',monospace;font-size:0.65rem;font-weight:700;background:#6b7280;color:#fff;border-radius:3px;padding:2px 7px;flex-shrink:0;">📌 NOTE</span>
        <span style="font-weight:600;font-size:0.78rem;">${ch.description||''}</span>
      `;
      row.parentNode.insertBefore(strip,row.nextSibling);
    }
  });

  // ── Step 2: Summary block below period grid ────────────────────────────────
  if(!changes.length&&!isAllAbsent&&!partialAbsentPeriods)return;

  const block=document.createElement('div');
  block.className='dc-detail-block';
  block.style.cssText=`margin-top:20px;border-radius:12px;overflow:hidden;border:1px solid ${isAllAbsent?'#fcd34d':'#bfdbfe'};`;

  const absentLabel=isAllAbsent?' — ABSENT ALL DAY':partialAbsentPeriods?` — ABSENT ${[...partialAbsentPeriods].map(p=>p.toUpperCase()).join('+')}` :'';
  let headerHtml=`<div style="background:${isAllAbsent?'#fef3c7':'#dbeafe'};padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid ${isAllAbsent?'#fcd34d':'#93c5fd'};">
    <span style="font-size:1rem;">📌</span>
    <span style="font-weight:700;font-size:0.88rem;color:${isAllAbsent?'#92400e':'#1e40af'};">Today's Changes${absentLabel}</span>
  </div>`;

  let bodyHtml='';
  if(changes.length){
    bodyHtml='<div style="padding:14px 18px;display:flex;flex-direction:column;gap:8px;background:var(--surface);">';
    changes.forEach(ch=>{
      const hasCover=ch.classCode||ch.room||ch.teacherCode;
      bodyHtml+=`<div style="display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:${ch.type==='cancelled'?'#fee2e2':ch.type==='cover'?'#f0fdf4':'#f8fafc'};border-radius:8px;border:1px solid ${ch.type==='cancelled'?'#fca5a5':ch.type==='cover'?'#bbf7d0':'#e2e8f0'};">
        <span style="font-family:'DM Mono',monospace;font-size:0.72rem;font-weight:700;background:var(--text);color:var(--bg);border-radius:4px;padding:3px 8px;flex-shrink:0;">${ch.period.toUpperCase()}</span>
        <div style="flex:1;min-width:0;">
          ${ch.description?`<div style="font-weight:700;font-size:0.82rem;margin-bottom:${hasCover?'5px':'0'};">${ch.description}</div>`:''}
          ${hasCover?`<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
            ${ch.classCode?`<span style="font-family:'DM Mono',monospace;font-size:0.7rem;background:#e5e7eb;color:#374151;border-radius:4px;padding:2px 7px;">${ch.classCode}</span>`:''}
            ${ch.room?`<span style="font-family:'DM Mono',monospace;font-size:0.73rem;font-weight:700;background:#1d4ed8;color:#fff;border-radius:4px;padding:2px 9px;">${ch.room}</span>`:''}
            ${ch.teacherCode?`<span style="font-family:'DM Mono',monospace;font-size:0.7rem;background:#374151;color:#fff;border-radius:4px;padding:2px 7px;">${ch.teacherCode}</span>`:''}
          </div>`:''}
        </div>
      </div>`;
    });
    bodyHtml+='</div>';
  }

  block.innerHTML=headerHtml+bodyHtml;
  const periodGrid=inner.querySelector('.period-grid');
  if(periodGrid)periodGrid.parentNode.insertBefore(block,periodGrid.nextSibling);
  else inner.appendChild(block);
}

loadDailyChanges();
setInterval(loadDailyChanges,300000);

// ── Tiles ──────────────────────────────────────────────────────────────────
function renderTiles(groupMap,names){
  const grid=document.getElementById('tileGrid');grid.innerHTML='';
  const lsoNames=getLSONames();
  const duringSchool=!isWeekend&&(()=>{const nm=nowMinutes();return nm>=timeToMinutes('08:50')&&nm<=timeToMinutes('15:30');})();
  const sorted=[...groupMap.entries()].sort((a,b)=>getLuminance(a[1].bg)-getLuminance(b[1].bg));
  sorted.forEach(([key,{bg,fg,slots}],gi)=>{
    const name=names[key]||`Name ${gi+1}`;
    const lsoName=lsoNames[key]||null;
    const activePeriods=[1,2,3,4,5,6].filter(p=>slots[p]&&slots[p].length>0);
    const tile=document.createElement('div');tile.className='tile';tile.dataset.name=name;
    tile.addEventListener('click',()=>openDetail(key));
    const bar=document.createElement('div');bar.className='tile-colour-bar';bar.style.background=bg;
    const body=document.createElement('div');body.className='tile-body';
    const nameEl=document.createElement('div');nameEl.className='tile-name';nameEl.textContent=name;
    const lsoEl=document.createElement('div');lsoEl.className='tile-lso-name';lsoEl.textContent=lsoName?`✉ ${lsoName}`:'';
    body.appendChild(nameEl);body.appendChild(lsoEl);
    if(activePeriods.length===0){const empty=document.createElement('div');empty.className='tile-empty-label';empty.textContent='No periods today';body.appendChild(empty);}
    else{const periods=document.createElement('div');periods.className='tile-periods';[1,2,3,4,5,6].forEach(p=>{const chip=document.createElement('div');chip.className='tile-period-chip'+(activePeriods.includes(p)?' has-data':'');chip.textContent=`P${p}`;periods.appendChild(chip);});body.appendChild(periods);}
    if(duringSchool){const{nowText,nextText}=getTileStatus(slots);if(nowText!==undefined||nextText!==undefined){const statusEl=document.createElement('div');statusEl.className='tile-status';function makeRow(label,text){const row=document.createElement('div');row.className='tile-status-row';const lbl=document.createElement('div');lbl.className='tile-status-label';lbl.textContent=label;const val=document.createElement('div');if(text===null){val.className='tile-status-value is-free';val.textContent='free';}else if(text==='Recess'||text==='Lunch'){val.className='tile-status-value is-break';val.textContent=text;}else{val.className='tile-status-value';val.textContent=text;}row.appendChild(lbl);row.appendChild(val);return row;}const{current}=getCurrentAndNext();if(current)statusEl.appendChild(makeRow('now',nowText));if(nextText!==undefined)statusEl.appendChild(makeRow('next',nextText));body.appendChild(statusEl);}}
    tile.appendChild(bar);tile.appendChild(body);grid.appendChild(tile);
  });
  applyChangesToTiles();
}

// ── Detail ─────────────────────────────────────────────────────────────────
function renderDetail(key,grp,name){
  const inner=document.getElementById('detailInner');
  const{bg,fg,slots}=grp;
  const periodRows=[1,2,3,4,5,6].map(p=>{const entries=slots[p];if(!entries||entries.length===0)return`<div class="period-row empty-row"><div class="accent-bar" style="background:${bg}"></div><div class="cell-period">P${p}</div><div class="cell-dash">—</div><div class="cell-data empty" style="grid-column:4/-1"></div></div>`;return entries.map(({d1,d2,d3})=>`<div class="period-row"><div class="accent-bar" style="background:${bg}"></div><div class="cell-period has-data">P${p}</div><div class="cell-dash">—</div><div class="cell-data${d1?'':' empty'}" data-copy="${escapeHTML(d1||'')}">${escapeHTML(d1||'')}</div><div class="cell-data${d2?'':' empty'}" data-copy="${escapeHTML(d2||'')}">${escapeHTML(d2||'')}</div><div class="cell-data${d3?'':' empty'}" data-copy="${escapeHTML(d3||'')}">${escapeHTML(d3||'')}</div></div>`).join('');}).join('');

  const lsoSettings=getLSOSettings(key);
  inner.innerHTML=`
    <div class="detail-header">
      <div class="detail-colour-bar" style="background:${bg}"></div>
      <div><div class="detail-title">${escapeHTML(name)}</div><div class="detail-sub">${escapeHTML(bg)}${fg?' · '+escapeHTML(fg):''}</div></div>
      <div class="detail-actions">
        <button class="copy-btn" id="copyAllBtn">Copy P1–P6</button>
        <button class="email-lso-btn" id="emailLSOToggle">✉ Email LSO</button>
      </div>
    </div>
    <div class="period-grid" id="periodGridEl">${periodRows}</div>
    <div class="lso-panel" id="lsoPanel">
      <div class="lso-panel-header">
        <div class="lso-panel-title"><span>✉</span> LSO Email — <em style="font-weight:400;font-style:normal;color:var(--muted)">${escapeHTML(name)}</em></div>
        <div style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);">Name is saved per person</div>
      </div>
      <div class="lso-settings">
        <div class="lso-input-wrap"><label>Your Name <span style="font-weight:400;color:var(--muted)">(for this person)</span></label><input class="lso-input" id="lsoName" type="text" value="${escapeHTML(lsoSettings.yourName)}" /><div class="lso-name-hint" id="lsoNameHint">saved for ${escapeHTML(name)}</div></div>
        <div class="lso-input-wrap"><label>Email Domain</label><input class="lso-input" id="lsoDomain" type="text" value="${escapeHTML(lsoSettings.domain)}" /></div>
        <div class="lso-input-wrap"><label>CC</label><input class="lso-input" id="lsoCC" type="text" value="${escapeHTML(lsoSettings.cc)}" /></div>
        <div class="lso-input-wrap" style="display:flex;flex-direction:column;justify-content:flex-end;"><button class="lso-copy-body-btn" id="lsoSaveNameBtn" style="width:100%;margin-top:auto;">💾 Save name for ${escapeHTML(name)}</button></div>
      </div>
      <div class="lso-panel-body">
        <div class="lso-row2">
          <div class="lso-field"><span class="lso-label">Subject</span><div class="lso-value" id="lsoSubject"></div></div>
          <div class="lso-field"><span class="lso-label">To (Teachers)</span><div id="lsoTeacherChips" class="teacher-chips"></div></div>
        </div>
        <div class="lso-field"><span class="lso-label">CC</span><div class="lso-value" id="lsoCCVal"></div></div>
        <div class="lso-field"><span class="lso-label">Body Preview</span><div class="lso-value" id="lsoBodyPreview" style="font-size:0.78rem;line-height:1.8;"></div></div>
      </div>
      <div class="lso-actions">
        <button class="lso-open-btn" id="lsoOpenBtn">📧 Open in Outlook</button>
        <button class="lso-copy-body-btn" id="lsoCopyLinkBtn">🔗 Copy Outlook Link</button>
        <button class="lso-copy-body-btn" id="lsoCopyBodyBtn">📋 Copy Body</button>
        <button class="lso-copy-body-btn" id="lsoCopySubjectBtn">📋 Copy Subject</button>
      </div>
    </div>`;

  let lastEmail=null;
  function refreshEmail(){
    const settings={domain:document.getElementById('lsoDomain').value.trim()||'stpeters.vic.edu.au',yourName:document.getElementById('lsoName').value.trim()||'Mr. Chew',cc:document.getElementById('lsoCC').value.trim()};
    saveLSOGlobalSettings(settings);
    // Get DC changes for this person to reflect in email
    const dcLookup=getDcLookup();
    const dcEntry=dcLookup[(name||'').toLowerCase()];
    const dcChanges=dcEntry?dcEntry.changes:[];
    lastEmail=buildLSOEmail(slots,settings,dcChanges);
    document.getElementById('lsoSubject').textContent=lastEmail.subject;
    document.getElementById('lsoCCVal').textContent=lastEmail.cc;
    document.getElementById('lsoBodyPreview').textContent=lastEmail.body;
    const chipsEl=document.getElementById('lsoTeacherChips');
    if(lastEmail.teacherEntries.length===0){chipsEl.innerHTML='<span style="color:var(--muted);font-size:0.8rem;font-style:italic;">No teachers found in timetable data</span>';}
    else{chipsEl.innerHTML=lastEmail.teacherEntries.map(([code,{prefix,isOverride}],i)=>`<div class="teacher-chip">${escapeHTML(code)}<span class="arrow">→</span><span class="email-part">${escapeHTML(lastEmail.teacherEmails[i])}</span>${isOverride?'<span class="override-badge">override</span>':''}</div>`).join('');}
  }
  inner.querySelector('#lsoSaveNameBtn').addEventListener('click',function(){
    const lsoNames=getLSONames();
    const val=document.getElementById('lsoName').value.trim();
    if(val)lsoNames[key]=val;else delete lsoNames[key];
    saveLSONames(lsoNames);
    const hint=document.getElementById('lsoNameHint');
    hint.textContent=`✓ saved for ${name}`;hint.style.color='#22a85a';
    setTimeout(()=>{hint.textContent=`saved for ${name}`;hint.style.color='';},2000);
    renderTiles(currentGroupMap,currentNames);
    // Also sync to server so AHK can read it
    const serverUrl=getServerUrl();
    if(serverUrl){
      const domain=document.getElementById('lsoDomain').value.trim()||'stpeters.vic.edu.au';
      const cc=document.getElementById('lsoCC').value.trim();
      // Use the LSO name value as the "user" key (Windows username expected by AHK)
      // We also store by the display name so the server can match either way
      fetch(serverUrl+'/lso-settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:val||name,name:val||name,domain,cc})}).catch(()=>{});
    }
  });
  inner.querySelector('#emailLSOToggle').addEventListener('click',function(){const panel=document.getElementById('lsoPanel');const isVisible=panel.classList.toggle('visible');this.textContent=isVisible?'✕ Close':'✉ Email LSO';if(isVisible){refreshEmail();panel.scrollIntoView({behavior:'smooth',block:'nearest'});}});
  ['lsoName','lsoDomain','lsoCC'].forEach(id=>{inner.querySelector('#'+id).addEventListener('input',refreshEmail);});
  inner.querySelector('#lsoOpenBtn').addEventListener('click',()=>{if(!lastEmail)return;const{subject,body,teacherEmails,cc}=lastEmail;const mailto=`mailto:${teacherEmails.join(';')}?cc=${encodeURIComponent(cc)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;window.location.href=mailto;});
  inner.querySelector('#lsoCopyLinkBtn').addEventListener('click',function(){if(!lastEmail)return;const{subject,body,teacherEmails,cc}=lastEmail;const mailto=`mailto:${teacherEmails.join(';')}?cc=${encodeURIComponent(cc)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;navigator.clipboard.writeText(mailto).then(()=>{this.textContent='✅ Copied!';setTimeout(()=>this.textContent='🔗 Copy Outlook Link',1800);});});
  inner.querySelector('#lsoCopyBodyBtn').addEventListener('click',function(){if(!lastEmail)return;navigator.clipboard.writeText(lastEmail.body).then(()=>{this.textContent='✅ Copied!';setTimeout(()=>this.textContent='📋 Copy Body',1800);});});
  inner.querySelector('#lsoCopySubjectBtn').addEventListener('click',function(){if(!lastEmail)return;navigator.clipboard.writeText(lastEmail.subject).then(()=>{this.textContent='✅ Copied!';setTimeout(()=>this.textContent='📋 Copy Subject',1800);});});
  inner.querySelector('#copyAllBtn').addEventListener('click',function(){const btn=this;const text=[1,2,3,4,5,6].map(p=>{const ent=slots[p];if(!ent||ent.length===0)return`P${p} - \t\t`;return ent.map(({d1,d2,d3})=>`P${p} - ${d1}\t${d2}\t${d3}`).join('\n');}).join('\n');navigator.clipboard.writeText(text).then(()=>flash(btn)).catch(()=>{const ta=Object.assign(document.createElement('textarea'),{value:text,style:'position:fixed;opacity:0'});document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);flash(btn);});});
  inner.addEventListener('click',e=>{const cell=e.target.closest('.cell-data:not(.empty)');if(!cell)return;const text=cell.dataset.copy;if(!text)return;navigator.clipboard.writeText(text).then(()=>{cell.classList.add('flash-copy');setTimeout(()=>cell.classList.remove('flash-copy'),1200);}).catch(()=>{});});

  // Inject today's changes
  injectDcIntoDetail(name);
}

function flash(btn){const orig=btn.textContent;btn.textContent='✓ Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},2000);}

// ── Top-level view tabs ────────────────────────────────────────────────────
let mainView='timetable';
document.getElementById('tabTimetable').addEventListener('click',()=>switchMainView('timetable'));
let mapLayoutLoaded=false;
document.getElementById('tabMap').addEventListener('click',()=>{
  switchMainView('map');
  if(!mapLayoutLoaded){mapLayoutLoaded=true;loadMapLayoutFromServer();}
  else{requestAnimationFrame(()=>renderMapView());}
});
window.addEventListener('resize',()=>{if(mainView==='map')renderMapView();});
function switchMainView(view){mainView=view;document.getElementById('tabTimetable').classList.toggle('active',view==='timetable');document.getElementById('tabMap').classList.toggle('active',view==='map');document.getElementById('mapView').classList.toggle('visible',view==='map');const onTimetable=view==='timetable';document.getElementById('viewToggleBtn').style.display=onTimetable?'':'none';if(view==='map'){['loadingState','emptyState','noServerState','tileView','detailView','serverSetup'].forEach(id=>{const el=document.getElementById(id);if(el){el.classList.remove('visible');el.style.display='none';}});document.getElementById('periodStrip').classList.remove('visible');}else{if(currentGroupMap){showScreen(activeDetailKey&&currentGroupMap.has(activeDetailKey)?'detailView':'tileView');}else{showScreen('loadingState');loadTimetable();}}}

// ── Map ────────────────────────────────────────────────────────────────────
let mapRooms=loadMapRooms();let mapTab='now';const mapEditMode=false;
function loadMapRooms(){try{return JSON.parse(localStorage.getItem('tt-map-rooms')||'[]');}catch(e){return[];}}
function saveMapRooms(){localStorage.setItem('tt-map-rooms',JSON.stringify(mapRooms));}
function mapUid(){return Math.random().toString(36).slice(2,9);}
document.querySelectorAll('[data-maptab]').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('[data-maptab]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');mapTab=btn.dataset.maptab;renderMapView();});});

async function loadMapLayoutFromServer(){const serverUrl=(localStorage.getItem('tt-server')||'https://timetable-server-r6nb.onrender.com').replace(/\/$/,'');try{const res=await fetch(`${serverUrl}/map-layout`);if(!res.ok)return;const data=await res.json();if(data.rooms&&Array.isArray(data.rooms)){mapRooms=data.rooms;saveMapRooms();}if(data.groups&&typeof data.groups==='object'){mapGroups={...data.groups,__v:MAP_LAYOUT_VERSION};saveMapGroups();}renderMapSidebar();renderMapView();}catch(e){renderMapView();}}

const MAP_PREFIX_POSITIONS={TC:{x:12,y:18},CL:{x:244,y:18},HC:{x:420,y:18},BE:{x:760,y:18},PA:{x:12,y:210},BR:{x:244,y:210},MC:{x:420,y:210},DO:{x:760,y:210},FW:{x:244,y:400},TF:{x:420,y:400},TA:{x:760,y:400},GL:{x:840,y:210}};
function getRoomPrefix(code){return code.length>=2?code.slice(0,2).toUpperCase():code.toUpperCase();}
const MAP_LAYOUT_VERSION=3;
let mapGroups=loadMapGroups();
function loadMapGroups(){try{const saved=JSON.parse(localStorage.getItem('tt-map-groups')||'null');if(!saved||saved.__v!==MAP_LAYOUT_VERSION)return{__v:MAP_LAYOUT_VERSION};return saved;}catch(e){return{__v:MAP_LAYOUT_VERSION};}}
function saveMapGroups(){mapGroups.__v=MAP_LAYOUT_VERSION;localStorage.setItem('tt-map-groups',JSON.stringify(mapGroups));}
function seedMapGroups(){let changed=false;const usedPrefixes=[...new Set(mapRooms.map(r=>getRoomPrefix(r.code)))];usedPrefixes.forEach(prefix=>{if(!mapGroups[prefix]){const known=MAP_PREFIX_POSITIONS[prefix];const count=Object.keys(mapGroups).length;const px=known||{x:20+(count%5)*190,y:20+Math.floor(count/5)*190};mapGroups[prefix]={xp:+(px.x/1080*100).toFixed(2),yp:+(px.y/600*100).toFixed(2)};changed=true;}});if(changed)saveMapGroups();}
seedMapGroups();
function mapAddRoom(code){if(mapRooms.find(r=>r.code===code))return;mapRooms.push({id:mapUid(),code});seedMapGroups();saveMapRooms();renderMapSidebar();renderMapView();}
function mapRemoveRoom(id){mapRooms=mapRooms.filter(r=>r.id!==id);const usedPrefixes=new Set(mapRooms.map(r=>getRoomPrefix(r.code)));Object.keys(mapGroups).forEach(p=>{if(!usedPrefixes.has(p))delete mapGroups[p];});saveMapRooms();saveMapGroups();renderMapSidebar();renderMapView();}
function renderMapSidebar(){}

// Check if a person is absent for a given period key (e.g. "p1")
function isPersonAbsentForPeriod(name, pKey) {
  if (!currentDailyChanges) return false;
  const lookup = getDcLookup();
  const entry = lookup[(name||'').toLowerCase()];
  if (!entry) return false;
  if (entry.absentPeriods === 'all') return true;
  if (Array.isArray(entry.absentPeriods) && pKey && entry.absentPeriods.includes(pKey)) return true;
  return false;
}

// Get the effective room for a person this period (DC override takes priority)
function getEffectiveRoom(name, originalRoom, pKey) {
  if (!currentDailyChanges || !pKey) return { room: originalRoom, changed: false, change: null };
  const lookup = getDcLookup();
  const entry = lookup[(name||'').toLowerCase()];
  if (!entry) return { room: originalRoom, changed: false, change: null };
  const ch = (entry.changes||[]).find(c => c.period === pKey && c.room);
  if (ch) return { room: ch.room.toUpperCase(), changed: true, change: ch };
  return { room: originalRoom, changed: false, change: null };
}

// Build placements map: room → [{name, color, fg, changed, change}]
// Skips absent people. Redirects people with DC room changes to new room.
function getMapPlacements(slot) {
  const map = new Map();
  if (!currentGroupMap || !slot || !slot.period) return map;
  const p = slot.period;
  const pKey = 'p' + p;

  currentGroupMap.forEach((grp, key) => {
    const name = currentNames[key] || key;
    // Skip if absent this period
    if (isPersonAbsentForPeriod(name, pKey)) return;

    const slots = grp.slots[p];
    if (!slots || !slots.length) return;
    const originalRoom = (slots[0].d2 || '').toUpperCase().trim();

    // Get effective room (may be overridden by DC change)
    const { room, changed, change } = getEffectiveRoom(name, originalRoom, pKey);
    if (!room) return; // no room = goes to no-room panel, not here

    if (!map.has(room)) map.set(room, []);
    map.get(room).push({ name, color: grp.bg, fg: grp.fg || null, changed, change, originalRoom });
  });
  return map;
}

// Collect people who have a timetable entry this period but NO room assigned
// (also people whose DC entry has no room — e.g. "MacqLit", "LEC", "RCP")
function getMapNoRoomPeople(slot) {
  const list = [];
  if (!currentGroupMap || !slot || !slot.period) return list;
  const p = slot.period;
  const pKey = 'p' + p;

  currentGroupMap.forEach((grp, key) => {
    const name = currentNames[key] || key;
    if (isPersonAbsentForPeriod(name, pKey)) return; // absent → not shown anywhere

    const slots = grp.slots[p];
    if (!slots || !slots.length) return; // not timetabled this period

    const originalRoom = (slots[0].d2 || '').toUpperCase().trim();
    const { room, changed, change } = getEffectiveRoom(name, originalRoom, pKey);

    if (!room) {
      // Has a period but no room — show in no-room panel
      list.push({ name, color: grp.bg, fg: grp.fg || null, changed, change,
        label: change ? (change.description || 'No room') : (slots[0].d1 || 'No room') });
    }
  });
  return list;
}

function renderMapView() {
  if (mainView !== 'map') return;
  const { cur, nxt } = getMapCurrentAndNext();

  // Resolve the slot based on active tab
  let slot;
  const periodTabMatch = mapTab.match(/^p(\d)$/);
  if (periodTabMatch) {
    const pNum = parseInt(periodTabMatch[1], 10);
    slot = SCHOOL_SCHEDULE.find(s => s.period === pNum) || null;
  } else {
    slot = mapTab === 'now' ? cur : nxt;
  }

  const pKey = slot && slot.period ? 'p' + slot.period : null;

  // Count for badges (exclude absent) — always based on live now/next
  let nc = 0, nx = 0;
  getMapPlacements(cur).forEach(a => nc += a.length);
  getMapPlacements(nxt).forEach(a => nx += a.length);
  document.getElementById('mapNowBadge').textContent = nc;
  document.getElementById('mapNextBadge').textContent = nx;

  const placements = getMapPlacements(slot);
  const noRoomPeople = getMapNoRoomPeople(slot);

  const canvas = document.getElementById('mapCanvas');
  canvas.querySelectorAll('.map-group, .map-noroom-panel').forEach(el => el.remove());
  document.getElementById('mapEmpty').style.display = mapRooms.length ? 'none' : '';

  const groups = {};
  mapRooms.forEach(room => {
    const prefix = getRoomPrefix(room.code);
    if (!groups[prefix]) groups[prefix] = [];
    groups[prefix].push(room);
  });

  const CANVAS_REF_W = 1100, CANVAS_REF_H = 660;
  const placedCodes = new Set(mapRooms.map(r => r.code.toUpperCase()));

  Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0])).forEach(([prefix, rooms]) => {
    if (!mapGroups[prefix]) {
      const known = MAP_PREFIX_POSITIONS[prefix];
      const count = Object.keys(mapGroups).filter(k => k !== '__v').length;
      const px = known || { x: 20 + (count % 5) * 190, y: 20 + Math.floor(count / 5) * 190 };
      mapGroups[prefix] = { xp: +(px.x / CANVAS_REF_W * 100).toFixed(2), yp: +(px.y / CANVAS_REF_H * 100).toFixed(2) };
      saveMapGroups();
    }
    const pos = mapGroups[prefix];
    const left = pos.xp !== undefined ? (pos.xp / 100 * CANVAS_REF_W) : (pos.x || 0);
    const top  = pos.yp !== undefined ? (pos.yp / 100 * CANVAS_REF_H) : (pos.y || 0);

    const groupEl = document.createElement('div');
    groupEl.className = 'map-group';
    groupEl.style.left = left + 'px';
    groupEl.style.top  = top  + 'px';

    const labelEl = document.createElement('div');
    labelEl.className = 'map-group-label';
    labelEl.textContent = prefix + ' Block';
    groupEl.appendChild(labelEl);

    const roomsEl = document.createElement('div');
    roomsEl.className = 'map-group-rooms';

    rooms.sort((a, b) => a.code.localeCompare(b.code)).forEach(room => {
      const students = placements.get(room.code.toUpperCase()) || [];
      const roomEl = document.createElement('div');
      roomEl.className = 'map-room' + (students.length ? ' occupied' : '');

      const codeRow = document.createElement('div');
      codeRow.className = 'map-room-code';
      codeRow.appendChild(document.createTextNode(room.code));
      roomEl.appendChild(codeRow);

      if (students.length) {
        const stuDiv = document.createElement('div');
        stuDiv.className = 'map-students';
        students.forEach(s => {
          const b = document.createElement('span');
          b.className = 'map-badge';
          b.style.background = s.color;
          if (s.fg) b.style.color = s.fg;
          b.textContent = s.name;
          // Show DC change tag if room was redirected
          if (s.changed && s.change) {
            const tag = document.createElement('span');
            tag.className = 'map-dc-tag';
            tag.style.cssText = 'background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;display:block;margin-top:2px;';
            const parts = [];
            if (s.originalRoom && s.originalRoom !== s.change.room) parts.push(s.originalRoom + '→' + s.change.room);
            if (s.change.teacherCode) parts.push(s.change.teacherCode);
            tag.textContent = '📌 ' + (parts.join(' · ') || s.change.description || 'changed');
            b.appendChild(tag);
          }
          stuDiv.appendChild(b);
        });
        roomEl.appendChild(stuDiv);
      }
      roomsEl.appendChild(roomEl);
    });

    groupEl.appendChild(roomsEl);
    if (mapEditMode) makeGroupDraggable(groupEl, prefix, pos);
    canvas.appendChild(groupEl);
  });

  // ── No-Room panel (top-right of canvas) ───────────────────────────────────
  canvas.querySelectorAll('.map-noroom-panel').forEach(el => el.remove());
  if (noRoomPeople.length > 0) {
    const panel = document.createElement('div');
    panel.className = 'map-noroom-panel';
    panel.style.cssText = `
      position:absolute; top:8px; right:8px; z-index:20;
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:10px; min-width:160px; max-width:220px;
      box-shadow:0 2px 12px rgba(0,0,0,.12);
    `;

    const panelLabel = document.createElement('div');
    panelLabel.style.cssText = `
      font-family:'DM Mono',monospace; font-size:0.55rem; font-weight:700;
      color:var(--muted); text-transform:uppercase; letter-spacing:.07em;
      padding:5px 8px 4px; border-bottom:1px solid var(--border);
      background:var(--soft); border-radius:8px 8px 0 0;
    `;
    panelLabel.textContent = '🏫 No room assigned';
    panel.appendChild(panelLabel);

    const list = document.createElement('div');
    list.style.cssText = 'padding:5px 6px; display:flex; flex-direction:column; gap:3px;';

    noRoomPeople.forEach(s => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex; flex-direction:column; gap:2px;';

      const badge = document.createElement('span');
      badge.className = 'map-badge';
      badge.style.cssText = `background:${s.color}; ${s.fg ? 'color:'+s.fg+';' : ''} display:block; border-radius:4px; padding:2px 7px; font-size:0.65rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;`;
      badge.textContent = s.name;

      const desc = document.createElement('span');
      desc.style.cssText = `font-family:'DM Mono',monospace; font-size:0.58rem; color:var(--muted); padding-left:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;`;
      desc.textContent = s.label;

      row.appendChild(badge);
      row.appendChild(desc);
      list.appendChild(row);
    });

    panel.appendChild(list);
    canvas.appendChild(panel);
  }

  // ── Unplaced rooms (in footer) ─────────────────────────────────────────────
  const unplacedEl = document.getElementById('mapUnplaced');
  const unplacedLabel = document.getElementById('mapUnplacedLabel');
  unplacedEl.innerHTML = '';
  const unplaced = [];
  placements.forEach((students, code) => {
    if (!placedCodes.has(code)) students.forEach(s => unplaced.push({ ...s, code }));
  });
  if (unplaced.length) {
    unplacedLabel.style.display = '';
    unplaced.forEach(s => {
      const b = document.createElement('span');
      b.className = 'map-badge';
      b.style.cssText = 'background:' + s.color + ';' + (s.fg ? 'color:' + s.fg + ';' : '') + 'cursor:default;';
      b.title = 'Room ' + s.code + ' not on map';
      b.textContent = s.name + ' (' + s.code + ')';
      unplacedEl.appendChild(b);
    });
  } else {
    unplacedLabel.style.display = 'none';
  }

  document.getElementById('mapStatus').textContent =
    slot ? (periodTabMatch ? slot.label + ' · ' + slot.start + '–' + slot.end + ' (pinned)' : ('Showing ' + slot.label + (slot.start ? ' · ' + slot.start + '–' + slot.end : ''))) : 'No period active';
}

function getMapCurrentAndNext(){const nm=nowMinutes();let cur=null,nxt=null;for(const s of SCHOOL_SCHEDULE){const a=timeToMinutes(s.start),b=timeToMinutes(s.end);if(nm>=a&&nm<b)cur=s;else if(nm<a&&!nxt)nxt=s;}return{cur,nxt};}

function makeGroupDraggable(groupEl,prefix,pos){const label=groupEl.querySelector('.map-group-label');let sx,sy,oleft,otop;const REF_W=1100,REF_H=660;function getPx(){return{left:pos.xp!==undefined?pos.xp/100*REF_W:(pos.x||0),top:pos.yp!==undefined?pos.yp/100*REF_H:(pos.y||0)};}function savePct(left,top){pos.xp=+(left/REF_W*100).toFixed(2);pos.yp=+(top/REF_H*100).toFixed(2);delete pos.x;delete pos.y;mapGroups[prefix]=pos;}function startDrag(clientX,clientY){const p=getPx();sx=clientX;sy=clientY;oleft=p.left;otop=p.top;groupEl.style.zIndex=10;}function doDrag(clientX,clientY){const newLeft=Math.max(0,oleft+clientX-sx);const newTop=Math.max(0,otop+clientY-sy);groupEl.style.left=newLeft+'px';groupEl.style.top=newTop+'px';savePct(newLeft,newTop);}function endDrag(){groupEl.style.zIndex='';saveMapGroups();}label.addEventListener('mousedown',e=>{e.preventDefault();startDrag(e.clientX,e.clientY);function move(e2){doDrag(e2.clientX,e2.clientY);}function up(){endDrag();document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);}document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);});label.addEventListener('touchstart',e=>{const t=e.touches[0];startDrag(t.clientX,t.clientY);function move(e2){const t2=e2.touches[0];doDrag(t2.clientX,t2.clientY);}function up(){endDrag();document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up);}document.addEventListener('touchmove',move,{passive:true});document.addEventListener('touchend',up);},{passive:true});}

renderMapSidebar();
loadTimetable();
</script>
