<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timetable</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
[data-theme="light"] {
  --bg:#f4f1ec; --surface:#ffffff; --surface2:#faf8f5; --border:#e4ddd4;
  --text:#18160f; --muted:#9e9890; --soft:#ede9e2;
  --shadow:0 2px 12px rgba(0,0,0,0.07); --shadow-lg:0 8px 32px rgba(0,0,0,0.13);
  --toggle-track:#d6d0c8; --toggle-thumb:#ffffff;
  --email-bg:#f0f7ff; --email-border:#c8ddf5; --email-btn:#2563eb;
}
[data-theme="dark"] {
  --bg:#111010; --surface:#1c1b1a; --surface2:#232220; --border:#2e2c29;
  --text:#f0ece4; --muted:#6b6760; --soft:#252320;
  --shadow:0 2px 12px rgba(0,0,0,0.3); --shadow-lg:0 8px 32px rgba(0,0,0,0.45);
  --toggle-track:#3a3835; --toggle-thumb:#f0ece4;
  --email-bg:#0d1a2a; --email-border:#1e3a5f; --email-btn:#3b82f6;
}
body { background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; min-height:100vh; transition:background .25s,color .25s; }

.site-header { background:var(--surface); border-bottom:1px solid var(--border); padding:20px 32px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:100; box-shadow:var(--shadow); transition:background .25s, border-color .25s; }
.back-btn { background:none; border:none; color:var(--text); font-size:1.4rem; cursor:pointer; padding:4px 8px 4px 0; line-height:1; display:none; transition:opacity .15s; }
.back-btn:hover { opacity:0.6; }
.back-btn.visible { display:block; }
.site-title { font-size:1.9rem; font-weight:900; color:var(--text); letter-spacing:-0.04em; line-height:1; }
.site-subtitle { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; margin-top:3px; }
.header-right { margin-left:auto; display:flex; align-items:center; gap:14px; }
.refresh-btn { background:none; border:1px solid var(--border); color:var(--muted); font-family:'Outfit',sans-serif; font-size:0.78rem; padding:6px 14px; border-radius:7px; cursor:pointer; transition:border-color .2s,color .2s; }
.refresh-btn:hover { border-color:var(--text); color:var(--text); }
.theme-toggle { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
.toggle-label { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; }
.toggle-track { width:36px; height:20px; border-radius:10px; background:var(--toggle-track); position:relative; transition:background .2s; flex-shrink:0; }
.toggle-track::after { content:''; position:absolute; top:3px; left:3px; width:14px; height:14px; border-radius:50%; background:var(--toggle-thumb); transition:transform .2s; box-shadow:0 1px 4px rgba(0,0,0,0.2); }
[data-theme="dark"] .toggle-track { background:#c8f542; }
[data-theme="dark"] .toggle-track::after { transform:translateX(16px); background:#111010; }

/* ── Period strip ── */
.period-strip { background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:73px; z-index:99; display:none; transition:background .25s,border-color .25s; }
.period-strip.visible { display:block; }
.period-strip-inner { max-width:1100px; margin:0 auto; padding:0 28px; height:44px; display:flex; align-items:center; gap:16px; }
.period-strip-dot { width:7px; height:7px; border-radius:50%; background:#22a85a; flex-shrink:0; animation:pulse-dot 2s ease-in-out infinite; }
.period-strip-dot.is-break { background:var(--muted); animation:none; }
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.45;transform:scale(0.7)} }
.period-strip-name { font-weight:700; font-size:0.88rem; letter-spacing:-0.01em; flex-shrink:0; }
.period-strip-time { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); flex-shrink:0; }
.period-strip-bar-wrap { flex:1; height:4px; background:var(--soft); border-radius:2px; overflow:hidden; min-width:40px; max-width:200px; }
.period-strip-bar { height:100%; border-radius:2px; background:#22a85a; transition:width .9s linear; }
.period-strip-bar.is-break { background:var(--muted); }
.period-strip-countdown { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--muted); flex-shrink:0; min-width:64px; }
.period-strip-sep { width:1px; height:18px; background:var(--border); flex-shrink:0; }
.period-strip-next { font-family:'DM Mono',monospace; font-size:0.68rem; color:var(--muted); flex-shrink:0; }
.period-strip-next strong { color:var(--text); font-weight:600; }
@media(max-width:520px){ .period-strip-bar-wrap,.period-strip-sep,.period-strip-next { display:none; } }

/* ── Tile status rows ── */
.tile-status { border-top:1px solid var(--border); margin-top:12px; padding-top:10px; display:flex; flex-direction:column; gap:5px; }
.tile-status-row { display:flex; align-items:center; gap:7px; }
.tile-status-label { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); flex-shrink:0; width:40px; }
.tile-status-value { font-family:'DM Mono',monospace; font-size:0.78rem; font-weight:600; color:var(--text); background:var(--soft); border:1px solid var(--border); border-radius:5px; padding:2px 8px; }
.tile-status-value.is-break { color:var(--muted); font-weight:400; font-style:italic; }
.tile-status-value.is-free  { color:var(--muted); font-weight:400; }

/* ── States ── */
.state-wrap { max-width:560px; margin:80px auto; padding:0 24px; text-align:center; }
.state-icon { font-size:3rem; margin-bottom:20px; opacity:0.4; }
.state-title { font-size:1.3rem; font-weight:700; margin-bottom:8px; }
.state-sub { font-size:0.88rem; color:var(--muted); line-height:1.7; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--text); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 20px; }
@keyframes spin { to { transform:rotate(360deg); } }

.server-setup { max-width:560px; margin:0 auto; padding:0 24px 24px; display:none; }
.server-setup.visible { display:block; }
.setup-row { display:flex; gap:10px; align-items:center; margin-top:20px; }
.setup-input { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Mono',monospace; font-size:0.82rem; padding:9px 14px; outline:none; transition:border-color .2s; }
.setup-input:focus { border-color:var(--text); }
.setup-btn { background:var(--text); color:var(--bg); border:none; font-family:'Outfit',sans-serif; font-size:0.85rem; font-weight:600; padding:10px 20px; border-radius:8px; cursor:pointer; white-space:nowrap; }

/* ── Tile View ── */
.tile-view { display:none; }
.tile-view.visible { display:block; }
.tile-grid { max-width:1100px; margin:0 auto; padding:28px 28px 100px; display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:18px; }
.tile { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:0; cursor:pointer; transition:transform .18s ease, box-shadow .18s ease, border-color .18s; overflow:hidden; box-shadow:var(--shadow); display:flex; flex-direction:column; min-height:160px; }
.tile:hover { transform:translateY(-4px); box-shadow:var(--shadow-lg); border-color:var(--muted); }
.tile:active { transform:translateY(-2px); }
.tile-colour-bar { height:8px; width:100%; flex-shrink:0; }
.tile-body { padding:20px 20px 18px; flex:1; display:flex; flex-direction:column; }
.tile-name { font-size:1.1rem; font-weight:800; letter-spacing:-0.02em; line-height:1.2; margin-bottom:4px; }
.tile-lso-name { font-size:0.72rem; font-family:'DM Mono',monospace; color:var(--muted); margin-bottom:10px; }
.tile-periods { display:flex; flex-wrap:wrap; gap:5px; margin-top:auto; }
.tile-period-chip { font-family:'DM Mono',monospace; font-size:0.65rem; font-weight:500; padding:3px 8px; border-radius:5px; background:var(--soft); color:var(--muted); border:1px solid var(--border); }
.tile-period-chip.has-data { color:var(--text); border-color:var(--muted); }
.tile-empty-label { font-size:0.78rem; color:var(--muted); font-style:italic; margin-top:auto; }

/* ── Detail View ── */
.detail-view { display:none; }
.detail-view.visible { display:block; }
.detail-inner { max-width:1000px; margin:0 auto; padding:32px 24px 100px; }
.detail-header { display:flex; align-items:center; gap:16px; margin-bottom:32px; flex-wrap:wrap; }
.detail-colour-bar { width:7px; height:54px; border-radius:4px; flex-shrink:0; }
.detail-title { font-size:2rem; font-weight:900; letter-spacing:-0.04em; line-height:1.1; }
.detail-sub { font-size:0.72rem; color:var(--muted); font-family:'DM Mono',monospace; margin-top:4px; }
.detail-actions { margin-left:auto; display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
.copy-btn { background:var(--text); color:var(--bg); border:none; font-family:'Outfit',sans-serif; font-size:0.85rem; font-weight:600; padding:11px 22px; border-radius:10px; cursor:pointer; transition:opacity .15s,transform .15s; white-space:nowrap; }
.copy-btn:hover { opacity:0.82; transform:translateY(-1px); }
.copy-btn.copied { background:#22a85a; color:#fff; }
.email-lso-btn { background:var(--email-btn); color:#fff; border:none; font-family:'Outfit',sans-serif; font-size:0.85rem; font-weight:600; padding:11px 22px; border-radius:10px; cursor:pointer; transition:opacity .15s,transform .15s; white-space:nowrap; }
.email-lso-btn:hover { opacity:0.85; transform:translateY(-1px); }

.period-grid { display:flex; flex-direction:column; gap:12px; }
.period-row { display:grid; grid-template-columns:6px 70px 28px 1fr 1fr 1fr; align-items:stretch; background:var(--surface); border-radius:14px; overflow:hidden; box-shadow:var(--shadow); border:1px solid var(--border); min-height:64px; transition:box-shadow .15s,border-color .15s; }
.period-row:hover { box-shadow:var(--shadow-lg); border-color:var(--muted); }
.period-row.empty-row { opacity:0.28; }
.period-row > div { display:flex; align-items:center; padding:18px 20px; }
.period-row > div + div { border-left:1px solid var(--border); }
.accent-bar { padding:0!important; border-left:none!important; width:6px; flex-shrink:0; }
.cell-period { background:var(--surface2); font-family:'DM Mono',monospace; font-size:0.8rem; font-weight:500; color:var(--muted); letter-spacing:0.05em; justify-content:center; flex-shrink:0; }
.cell-period.has-data { color:var(--text); font-weight:700; font-size:0.85rem; }
.cell-dash { color:var(--border); justify-content:center; font-size:0.75rem; padding:18px 8px!important; flex-shrink:0; border-left:none!important; }
.cell-data { color:var(--text); font-weight:500; font-size:0.95rem; line-height:1.5; word-break:break-word; padding:20px 24px!important; align-items:flex-start; cursor:pointer; position:relative; transition:background .15s; user-select:none; }
.cell-data:not(.empty):hover { background:var(--soft); }
.cell-data:not(.empty):hover::after { content:'copy'; position:absolute; top:8px; right:10px; font-family:'DM Mono',monospace; font-size:0.62rem; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; opacity:0.7; }
.cell-data.flash-copy { background:var(--soft); }
.cell-data.flash-copy::after { content:'✓'; position:absolute; top:8px; right:10px; font-size:0.7rem; color:#22a85a; }
.cell-data.empty { cursor:default; }

/* ── LSO Email Panel ── */
.lso-panel { margin-top:32px; background:var(--email-bg); border:1px solid var(--email-border); border-radius:16px; overflow:hidden; display:none; }
.lso-panel.visible { display:block; }
.lso-panel-header { padding:18px 24px; border-bottom:1px solid var(--email-border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.lso-panel-title { font-size:1rem; font-weight:700; display:flex; align-items:center; gap:8px; }
.lso-panel-body { padding:20px 24px; }
.lso-field { margin-bottom:14px; }
.lso-label { display:block; font-size:0.72rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:5px; }
.lso-value { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-family:'DM Mono',monospace; font-size:0.82rem; color:var(--text); line-height:1.6; white-space:pre-wrap; word-break:break-all; }
.lso-row2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.lso-settings { padding:0 24px 20px; display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px; }
@media(max-width:700px){ .lso-settings { grid-template-columns:1fr 1fr; } }
.lso-input-wrap label { display:block; font-size:0.7rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:5px; }
.lso-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:7px; color:var(--text); font-family:'DM Mono',monospace; font-size:0.8rem; padding:8px 12px; outline:none; transition:border-color .2s; }
.lso-input:focus { border-color:var(--email-btn); }
.lso-name-hint { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--muted); margin-top:4px; }
.lso-actions { padding:0 24px 20px; display:flex; gap:10px; flex-wrap:wrap; }
.lso-open-btn { background:var(--email-btn); color:#fff; border:none; font-family:'Outfit',sans-serif; font-size:0.88rem; font-weight:600; padding:11px 24px; border-radius:9px; cursor:pointer; transition:opacity .15s; }
.lso-open-btn:hover { opacity:0.85; }
.lso-copy-body-btn { background:var(--border); color:var(--text); border:none; font-family:'Outfit',sans-serif; font-size:0.88rem; font-weight:500; padding:11px 20px; border-radius:9px; cursor:pointer; transition:opacity .15s; }
.lso-copy-body-btn:hover { opacity:0.75; }

.teacher-chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.teacher-chip { background:var(--soft); border:1px solid var(--border); border-radius:6px; padding:3px 10px; font-family:'DM Mono',monospace; font-size:0.75rem; color:var(--text); }
.teacher-chip .arrow { color:var(--muted); margin:0 4px; }
.teacher-chip .email-part { color:var(--email-btn); }
.teacher-chip .override-badge { font-size:0.6rem; background:var(--email-btn); color:#fff; border-radius:3px; padding:1px 4px; margin-left:4px; vertical-align:middle; }

.tile-view.visible { animation:fadeUp .25s ease both; }
.detail-view.visible { animation:fadeUp .22s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

@media(max-width:600px) {
  .lso-row2 { grid-template-columns:1fr; }
  .detail-actions { margin-left:0; width:100%; }
}
</style>
</head>
<body>

<header class="site-header">
  <button class="back-btn" id="backBtn" title="Back to timetable">←</button>
  <div>
    <div class="site-title" id="siteTitle">Timetable</div>
    <div class="site-subtitle" id="siteSubtitle"></div>
  </div>
  <div class="header-right">
    <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
    <div class="theme-toggle" id="themeToggle">
      <span class="toggle-label" id="toggleLabel">Light</span>
      <div class="toggle-track"></div>
    </div>
  </div>
</header>

<div class="period-strip" id="periodStrip">
  <div class="period-strip-inner">
    <div class="period-strip-dot" id="stripDot"></div>
    <div class="period-strip-name" id="stripName"></div>
    <div class="period-strip-time" id="stripTime"></div>
    <div class="period-strip-bar-wrap"><div class="period-strip-bar" id="stripBar"></div></div>
    <div class="period-strip-countdown" id="stripCountdown"></div>
    <div class="period-strip-sep"></div>
    <div class="period-strip-next" id="stripNext"></div>
  </div>
</div>

<div class="state-wrap" id="loadingState">
  <div class="spinner"></div>
  <div class="state-title">Loading timetable…</div>
</div>
<div class="state-wrap" id="emptyState" style="display:none">
  <div class="state-icon">📭</div>
  <div class="state-title">No timetable yet today</div>
  <div class="state-sub">The admin hasn't uploaded today's timetable yet. Check back soon.</div>
</div>
<div class="state-wrap" id="noServerState" style="display:none">
  <div class="state-icon">🔌</div>
  <div class="state-title">Server not configured</div>
  <div class="state-sub">Enter the server URL below to connect.</div>
</div>
<div class="server-setup" id="serverSetup">
  <div class="setup-row">
    <input id="serverUrlInput" class="setup-input" type="text" placeholder="https://your-app.onrender.com" />
    <button class="setup-btn" id="connectBtn">Connect</button>
  </div>
</div>

<div class="tile-view" id="tileView">
  <div class="tile-grid" id="tileGrid"></div>
</div>
<div class="detail-view" id="detailView">
  <div class="detail-inner" id="detailInner"></div>
</div>

<script>
// ── School schedule ────────────────────────────────────────────────────────
const SCHOOL_SCHEDULE = [
  { label:'Tutor Group', start:'08:50', end:'09:00' },
  { label:'Period 1',    start:'09:03', end:'09:53', period:1 },
  { label:'Period 2',    start:'09:56', end:'10:46', period:2 },
  { label:'Recess',      start:'10:46', end:'11:06', break:'Recess' },
  { label:'Period 3',    start:'11:10', end:'12:00', period:3 },
  { label:'Period 4',    start:'12:03', end:'12:53', period:4 },
  { label:'Lunch',       start:'12:53', end:'13:33', break:'Lunch' },
  { label:'Period 5',    start:'13:37', end:'14:27', period:5 },
  { label:'Period 6',    start:'14:30', end:'15:20', period:6 },
];

function timeToMinutes(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function nowMinutes() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes() + n.getSeconds() / 60;
}

// Returns { current, next } where each is a SCHOOL_SCHEDULE slot (or null)
function getCurrentAndNext() {
  const nm = nowMinutes();
  let current = null, next = null;
  for (const slot of SCHOOL_SCHEDULE) {
    const s = timeToMinutes(slot.start), e = timeToMinutes(slot.end);
    if (nm >= s && nm < e) current = slot;
    else if (nm < s && !next) next = slot;
  }
  return { current, next };
}

// For a given person's slots, return the room value (d2) for a period number, or null
function getRoomForPeriod(slots, periodNum) {
  if (!periodNum || !slots[periodNum] || !slots[periodNum].length) return null;
  return slots[periodNum][0].d2 || slots[periodNum][0].d1 || null;
}

// Returns { nowText, nextText } strings to show on the tile
// nowText / nextText = room like "BR2", or "Recess"/"Lunch", or null (free/before school)
function getTileStatus(slots) {
  const { current, next } = getCurrentAndNext();

  function resolveSlot(slot) {
    if (!slot) return null;
    if (slot.break) return slot.break;           // "Recess" or "Lunch"
    if (slot.label === 'Tutor Group') return 'Tutor';
    if (!slot.period) return null;
    const room = getRoomForPeriod(slots, slot.period);
    return room || null;                         // null = this person is free this period
  }

  return {
    nowText:  resolveSlot(current),
    nextText: resolveSlot(next),
  };
}

let tileRefreshTimer = null;
function startTileRefresh() {
  if (tileRefreshTimer) clearInterval(tileRefreshTimer);
  tileRefreshTimer = setInterval(() => {
    if (currentGroupMap) renderTiles(currentGroupMap, currentNames);
  }, 30000); // refresh tiles every 30s
}

// ── Period strip ──────────────────────────────────────────────────────────
function formatTime12(t) {
  const [h, m] = t.split(':').map(Number);
  return `${h % 12 || 12}:${String(m).padStart(2,'0')}${h >= 12 ? 'pm' : 'am'}`;
}

function formatCountdown(secsRemaining) {
  const s = Math.max(0, Math.round(secsRemaining));
  const m = Math.floor(s / 60), r = s % 60;
  if (m === 0) return `${r}s`;
  return `${m}m ${String(r).padStart(2,'0')}s`;
}

function updateStrip() {
  const strip = document.getElementById('periodStrip');
  // Only show on tile view, weekdays during school hours
  const tileVisible = document.getElementById('tileView').classList.contains('visible');
  if (isWeekend || !tileVisible) { strip.classList.remove('visible'); return; }

  const now2 = new Date();
  const nmSecs = now2.getHours()*3600 + now2.getMinutes()*60 + now2.getSeconds();
  const schoolStartSecs = timeToMinutes('08:40') * 60;
  const schoolEndSecs   = timeToMinutes('15:30') * 60;
  if (nmSecs < schoolStartSecs || nmSecs > schoolEndSecs) {
    strip.classList.remove('visible'); return;
  }

  strip.classList.add('visible');

  // Find current and next using seconds precision
  let current = null, next = null;
  for (const slot of SCHOOL_SCHEDULE) {
    const s = timeToMinutes(slot.start) * 60;
    const e = timeToMinutes(slot.end)   * 60;
    if (nmSecs >= s && nmSecs < e) current = { ...slot, startSecs: s, endSecs: e };
    else if (nmSecs < s && !next)  next    = { ...slot, startSecs: s, endSecs: e };
  }

  const dot       = document.getElementById('stripDot');
  const nameEl    = document.getElementById('stripName');
  const timeEl    = document.getElementById('stripTime');
  const bar       = document.getElementById('stripBar');
  const countdown = document.getElementById('stripCountdown');
  const nextEl    = document.getElementById('stripNext');

  if (current) {
    const isBreak = !!current.break;
    const remaining = current.endSecs - nmSecs;
    const total = current.endSecs - current.startSecs;
    const pct = Math.min(100, ((nmSecs - current.startSecs) / total) * 100);

    dot.className = 'period-strip-dot' + (isBreak ? ' is-break' : '');
    nameEl.textContent = current.label;
    timeEl.textContent = `${formatTime12(current.start)} – ${formatTime12(current.end)}`;
    bar.style.width = pct + '%';
    bar.className = 'period-strip-bar' + (isBreak ? ' is-break' : '');
    countdown.textContent = formatCountdown(remaining) + ' left';
  } else {
    // Between slots — show time until next
    dot.className = 'period-strip-dot is-break';
    nameEl.textContent = 'Between periods';
    timeEl.textContent = '';
    bar.style.width = '0%';
    bar.className = 'period-strip-bar is-break';
    const until = next ? (next.startSecs - nmSecs) : 0;
    countdown.textContent = next ? formatCountdown(until) + ' until' : '';
  }

  if (next) {
    nextEl.innerHTML = `Next: <strong>${next.label}</strong> ${formatTime12(next.start)}`;
  } else {
    nextEl.textContent = 'Last period done';
  }
}

let stripTimer = null;
function startStrip() {
  updateStrip();
  if (stripTimer) clearInterval(stripTimer);
  stripTimer = setInterval(updateStrip, 1000);
}

// ── Cycle ──────────────────────────────────────────────────────────────────
const CYCLE_START = new Date('2026-02-23T00:00:00');
function getTodayDayNumber() {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(CYCLE_START); start.setHours(0,0,0,0);
  let count = 0; const d = new Date(start);
  while (d <= today) { if (d.getDay()!==0&&d.getDay()!==6) count++; d.setDate(d.getDate()+1); }
  return count > 0 ? ((count-1)%10)+1 : null;
}
const DAYS_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const now = new Date();
const dow = now.getDay();
const isWeekend = dow===0||dow===6;
const dayNum = getTodayDayNumber();
const siteTitle = document.getElementById('siteTitle');
const siteSub   = document.getElementById('siteSubtitle');
if (!isWeekend&&dayNum) {
  siteTitle.textContent = `Timetable (Day ${dayNum})`;
  siteSub.textContent = DAYS_LONG[dow]+' · '+now.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
} else {
  siteTitle.textContent = 'Timetable';
  siteSub.textContent = DAYS_LONG[dow]+' · '+now.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

// ── Helpers ────────────────────────────────────────────────────────────────
function getLuminance(c){const n=(c||'').match(/\d+/g);return(!n||n.length<3)?999:0.299*+n[0]+0.587*+n[1]+0.114*+n[2];}
function escapeHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── LSO Name per person ─────────────────────────────────────────────────────
// Stored in localStorage as { [colourKey]: "Mr. Smith" }
// The global fallback is also stored: lso-name (legacy)
function getLSONames() {
  try { return JSON.parse(localStorage.getItem('tt-lso-names') || '{}'); }
  catch(e) { return {}; }
}
function saveLSONames(obj) {
  localStorage.setItem('tt-lso-names', JSON.stringify(obj));
}
function getLSONameForKey(key) {
  const names = getLSONames();
  // per-person name takes priority, then global fallback
  return names[key] || localStorage.getItem('lso-name') || 'Mr. Chew';
}

// ── Email helpers ──────────────────────────────────────────────────────────
function getToday_ddmmyy() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
}

function getEmailOverrides() {
  try { return JSON.parse(localStorage.getItem('tt-email-overrides') || '{}'); }
  catch(e) { return {}; }
}

function codeToEmailPrefix(code, overrides) {
  const upper = code.toUpperCase().trim();
  if (overrides[upper]) return { prefix: overrides[upper], isOverride: true };
  const lower = upper.toLowerCase();
  return { prefix: lower[lower.length-1] + lower.slice(0, lower.length-1), isOverride: false };
}

function buildLSOEmail(slots, lsoSettings) {
  const { domain, yourName, cc } = lsoSettings;
  const overrides = getEmailOverrides();
  const dd = getToday_ddmmyy();
  const subject = `LSO ${dd}`;

  const periodLines = [];
  const teacherMap = new Map();

  for (let p = 1; p <= 6; p++) {
    const entries = slots[p];
    if (entries && entries.length > 0) {
      entries.forEach(({d1, d2, d3}) => {
        if (d1 || d2 || d3) {
          periodLines.push(`P${p} - ${d1 || ''}   ${d2 || ''}   ${d3 || ''}`.trimEnd());
          if (d3) {
            const code = d3.trim().toUpperCase();
            if (!teacherMap.has(code)) {
              teacherMap.set(code, codeToEmailPrefix(code, overrides));
            }
          }
        }
      });
    }
  }

  const teacherEntries = [...teacherMap.entries()];
  const teacherEmails = teacherEntries.map(([code, {prefix}]) => `${prefix}@${domain}`);

  const body = [
    'Good morning teachers,',
    '',
    'Today I will be attending and supporting the students within your classes.',
    '',
    ...periodLines,
    '',
    `Please introduce me to the students as ${yourName}.`,
    'I look forward to working with you today and providing effective support to our students.',
    '',
    'Kind regards,',
    yourName
  ].join('\n');

  return { subject, body, teacherEmails, teacherEntries, cc };
}

function getLSOSettings(key) {
  return {
    domain:   localStorage.getItem('lso-domain') || 'stpeters.vic.edu.au',
    yourName: getLSONameForKey(key),
    cc:       localStorage.getItem('lso-cc') || 'kmcmellon@stpeters.vic.edu.au'
  };
}
function saveLSOGlobalSettings(s) {
  localStorage.setItem('lso-domain', s.domain);
  localStorage.setItem('lso-cc', s.cc);

}

// ── State ──────────────────────────────────────────────────────────────────
let currentGroupMap = null;
let currentNames    = {};
let activeDetailKey = null; // tracks which person is open

function showScreen(id) {
  ['loadingState','emptyState','noServerState','tileView','detailView'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = 'none'; el.classList.remove('visible');
  });
  document.getElementById('serverSetup').classList.toggle('visible', id==='noServerState');
  const target = document.getElementById(id);
  target.style.display = '';
  requestAnimationFrame(() => target.classList.add('visible'));
  if (id === 'tileView') { startTileRefresh(); startStrip(); }
  else { document.getElementById('periodStrip').classList.remove('visible'); }
}

const backBtn = document.getElementById('backBtn');

function goHome() {
  activeDetailKey = null;
  backBtn.classList.remove('visible');
  siteTitle.textContent = dayNum&&!isWeekend?`Timetable (Day ${dayNum})`:'Timetable';
  showScreen('tileView');
}

function openDetail(key) {
  if (!currentGroupMap) return;
  const grp = currentGroupMap.get(key); if (!grp) return;
  const name = currentNames[key] || '—';
  activeDetailKey = key;
  siteTitle.textContent = name;
  backBtn.classList.add('visible');
  renderDetail(key, grp, name);
  showScreen('detailView');
  window.scrollTo({ top:0, behavior:'smooth' });
}

backBtn.addEventListener('click', goHome);

// ── Load timetable ─────────────────────────────────────────────────────────
async function loadTimetable() {
  const url = getServerUrl();
  if (!url) { showScreen('noServerState'); return; }
  showScreen('loadingState');
  try {
    const res = await fetch(`${url}/timetable`);
    if (res.status===404) { showScreen('emptyState'); return; }
    if (!res.ok) { showScreen('emptyState'); return; }
    const state = await res.json();
    if (!state.map) { showScreen('emptyState'); return; }
    const groupMap = new Map();
    for (const [k,v] of Object.entries(state.map)) groupMap.set(k,v);
    currentGroupMap = groupMap;
    currentNames    = state.names || {};
    try {
      localStorage.setItem('tt-cached-data', JSON.stringify(state));
      localStorage.setItem('tt-cached-time', Date.now().toString());
    } catch(e) {}
    renderTiles(groupMap, currentNames);
    // If a detail was open, silently re-render it in place; otherwise go to tiles
    if (activeDetailKey && groupMap.has(activeDetailKey)) {
      const grp = groupMap.get(activeDetailKey);
      const name = currentNames[activeDetailKey] || '—';
      siteTitle.textContent = name;
      backBtn.classList.add('visible');
      renderDetail(activeDetailKey, grp, name);
      showScreen('detailView');
    } else {
      activeDetailKey = null;
      showScreen('tileView');
    }
  } catch(e) {
    const cached = localStorage.getItem('tt-cached-data');
    const cachedTime = parseInt(localStorage.getItem('tt-cached-time')||'0');
    const ageHours = (Date.now()-cachedTime)/3600000;
    if (cached && ageHours < 20) {
      try {
        const state = JSON.parse(cached);
        const groupMap = new Map();
        for (const [k,v] of Object.entries(state.map)) groupMap.set(k,v);
        currentGroupMap = groupMap;
        currentNames    = state.names || {};
        renderTiles(groupMap, currentNames);
        if (activeDetailKey && groupMap.has(activeDetailKey)) {
          const grp = groupMap.get(activeDetailKey);
          const name = currentNames[activeDetailKey] || '—';
          siteTitle.textContent = name;
          backBtn.classList.add('visible');
          renderDetail(activeDetailKey, grp, name);
          showScreen('detailView');
        } else {
          activeDetailKey = null;
          showScreen('tileView');
        }
        showStaleBanner();
        return;
      } catch(e2) {}
    }
    showScreen('noServerState');
  }
}

function showStaleBanner() {
  if (document.getElementById('staleBanner')) return;
  const b = document.createElement('div');
  b.id = 'staleBanner';
  b.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#b45309;color:#fff;padding:10px 20px;border-radius:10px;font-size:0.82rem;font-family:Outfit,sans-serif;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.3);';
  b.textContent = '⚠️ Showing cached data — server unreachable';
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 6000);
}

document.getElementById('refreshBtn').addEventListener('click', loadTimetable);
setInterval(loadTimetable, 600000);

// ── Tiles ──────────────────────────────────────────────────────────────────
function renderTiles(groupMap, names) {
  const grid = document.getElementById('tileGrid');
  grid.innerHTML = '';
  const lsoNames = getLSONames();
  const duringSchool = !isWeekend && (() => {
    const nm = nowMinutes();
    return nm >= timeToMinutes('08:50') && nm <= timeToMinutes('15:30');
  })();
  const sorted = [...groupMap.entries()].sort((a,b)=>getLuminance(a[1].bg)-getLuminance(b[1].bg));
  sorted.forEach(([key,{bg,fg,slots}],gi) => {
    const name = names[key]||`Name ${gi+1}`;
    const lsoName = lsoNames[key] || null;
    const activePeriods = [1,2,3,4,5,6].filter(p=>slots[p]&&slots[p].length>0);
    const tile = document.createElement('div'); tile.className='tile';
    tile.addEventListener('click',()=>openDetail(key));
    const bar = document.createElement('div'); bar.className='tile-colour-bar'; bar.style.background=bg;
    const body = document.createElement('div'); body.className='tile-body';
    const nameEl = document.createElement('div'); nameEl.className='tile-name'; nameEl.textContent=name;
    const lsoEl  = document.createElement('div'); lsoEl.className='tile-lso-name';
    lsoEl.textContent = lsoName ? `✉ ${lsoName}` : '';

    body.appendChild(nameEl);
    body.appendChild(lsoEl);

    if (activePeriods.length===0) {
      const empty = document.createElement('div'); empty.className='tile-empty-label'; empty.textContent='No periods today';
      body.appendChild(empty);
    } else {
      const periods = document.createElement('div'); periods.className='tile-periods';
      [1,2,3,4,5,6].forEach(p=>{
        const chip=document.createElement('div');
        chip.className='tile-period-chip'+(activePeriods.includes(p)?' has-data':'');
        chip.textContent=`P${p}`; periods.appendChild(chip);
      });
      body.appendChild(periods);
    }

    // ── Current / Next status ──────────────────────────────────────────────
    if (duringSchool) {
      const { nowText, nextText } = getTileStatus(slots);
      // Only show the section if at least one has something to say
      if (nowText !== undefined || nextText !== undefined) {
        const statusEl = document.createElement('div'); statusEl.className='tile-status';

        function makeRow(label, text) {
          const row = document.createElement('div'); row.className='tile-status-row';
          const lbl = document.createElement('div'); lbl.className='tile-status-label'; lbl.textContent=label;
          const val = document.createElement('div');
          if (text === null) {
            // person has no class in this slot (free period)
            val.className='tile-status-value is-free'; val.textContent='free';
          } else if (text === 'Recess' || text === 'Lunch') {
            val.className='tile-status-value is-break'; val.textContent=text;
          } else {
            val.className='tile-status-value'; val.textContent=text;
          }
          row.appendChild(lbl); row.appendChild(val);
          return row;
        }

        // "now" row — only show during school hours (not before school starts)
        const { current } = getCurrentAndNext();
        if (current) statusEl.appendChild(makeRow('now', nowText));
        if (nextText !== undefined) statusEl.appendChild(makeRow('next', nextText));

        body.appendChild(statusEl);
      }
    }

    tile.appendChild(bar); tile.appendChild(body); grid.appendChild(tile);
  });
}

// ── Detail ─────────────────────────────────────────────────────────────────
function renderDetail(key, grp, name) {
  const inner = document.getElementById('detailInner');
  const { bg, fg, slots } = grp;

  const periodRows = [1,2,3,4,5,6].map(p => {
    const entries = slots[p];
    if (!entries||entries.length===0) return `<div class="period-row empty-row"><div class="accent-bar" style="background:${bg}"></div><div class="cell-period">P${p}</div><div class="cell-dash">—</div><div class="cell-data empty" style="grid-column:4/-1"></div></div>`;
    return entries.map(({d1,d2,d3})=>`<div class="period-row"><div class="accent-bar" style="background:${bg}"></div><div class="cell-period has-data">P${p}</div><div class="cell-dash">—</div><div class="cell-data${d1?'':' empty'}" data-copy="${escapeHTML(d1||'')}">${escapeHTML(d1||'')}</div><div class="cell-data${d2?'':' empty'}" data-copy="${escapeHTML(d2||'')}">${escapeHTML(d2||'')}</div><div class="cell-data${d3?'':' empty'}" data-copy="${escapeHTML(d3||'')}">${escapeHTML(d3||'')}</div></div>`).join('');
  }).join('');

  const lsoSettings = getLSOSettings(key);
  const currentLSOName = lsoSettings.yourName;

  inner.innerHTML = `
    <div class="detail-header">
      <div class="detail-colour-bar" style="background:${bg}"></div>
      <div>
        <div class="detail-title">${escapeHTML(name)}</div>
        <div class="detail-sub">${escapeHTML(bg)}${fg?' · '+escapeHTML(fg):''}</div>
      </div>
      <div class="detail-actions">
        <button class="copy-btn" id="copyAllBtn">Copy P1–P6</button>
        <button class="email-lso-btn" id="emailLSOToggle">✉ Email LSO</button>
      </div>
    </div>
    <div class="period-grid">${periodRows}</div>

    <div class="lso-panel" id="lsoPanel">
      <div class="lso-panel-header">
        <div class="lso-panel-title"><span>✉</span> LSO Email — <em style="font-weight:400;font-style:normal;color:var(--muted)">${escapeHTML(name)}</em></div>
        <div style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);">Name is saved per person · overrides from Admin page</div>
      </div>
      <div class="lso-settings">
        <div class="lso-input-wrap">
          <label>Your Name <span style="font-weight:400;color:var(--muted)">(for this person)</span></label>
          <input class="lso-input" id="lsoName" type="text" value="${escapeHTML(currentLSOName)}" placeholder="Mr. Chew" />
          <div class="lso-name-hint" id="lsoNameHint">saved for ${escapeHTML(name)}</div>
        </div>
        <div class="lso-input-wrap">
          <label>Email Domain</label>
          <input class="lso-input" id="lsoDomain" type="text" value="${escapeHTML(lsoSettings.domain)}" placeholder="stpeters.vic.edu.au" />
        </div>
        <div class="lso-input-wrap">
          <label>CC</label>
          <input class="lso-input" id="lsoCC" type="text" value="${escapeHTML(lsoSettings.cc)}" placeholder="cc@school.edu.au" />
        </div>
        <div class="lso-input-wrap" style="display:flex;flex-direction:column;justify-content:flex-end;">
          <button class="lso-copy-body-btn" id="lsoSaveNameBtn" style="width:100%;margin-top:auto;">💾 Save name for ${escapeHTML(name)}</button>
        </div>
      </div>
      <div class="lso-panel-body">
        <div class="lso-row2">
          <div class="lso-field">
            <span class="lso-label">Subject</span>
            <div class="lso-value" id="lsoSubject"></div>
          </div>
          <div class="lso-field">
            <span class="lso-label">To (Teachers)</span>
            <div id="lsoTeacherChips" class="teacher-chips"></div>
          </div>
        </div>
        <div class="lso-field">
          <span class="lso-label">CC</span>
          <div class="lso-value" id="lsoCCVal"></div>
        </div>
        <div class="lso-field">
          <span class="lso-label">Body Preview</span>
          <div class="lso-value" id="lsoBodyPreview" style="font-size:0.78rem;line-height:1.8;"></div>
        </div>
      </div>
      <div class="lso-actions">
        <button class="lso-open-btn" id="lsoOpenBtn">📧 Open in Outlook</button>
        <button class="lso-copy-body-btn" id="lsoCopyBodyBtn">📋 Copy Body</button>
        <button class="lso-copy-body-btn" id="lsoCopySubjectBtn">📋 Copy Subject</button>
      </div>
    </div>
  `;

  let lastEmail = null;

  function refreshEmail() {
    const settings = {
      domain:   document.getElementById('lsoDomain').value.trim() || 'stpeters.vic.edu.au',
      yourName: document.getElementById('lsoName').value.trim() || 'Mr. Chew',
      cc:       document.getElementById('lsoCC').value.trim()
    };
    saveLSOGlobalSettings(settings);
    lastEmail = buildLSOEmail(slots, settings);

    document.getElementById('lsoSubject').textContent = lastEmail.subject;
    document.getElementById('lsoCCVal').textContent = lastEmail.cc;
    document.getElementById('lsoBodyPreview').textContent = lastEmail.body;

    const chipsEl = document.getElementById('lsoTeacherChips');
    if (lastEmail.teacherEntries.length === 0) {
      chipsEl.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;font-style:italic;">No teachers found in timetable data</span>';
    } else {
      chipsEl.innerHTML = lastEmail.teacherEntries.map(([code, {prefix, isOverride}], i) =>
        `<div class="teacher-chip">
          ${escapeHTML(code)}<span class="arrow">→</span>
          <span class="email-part">${escapeHTML(lastEmail.teacherEmails[i])}</span>
          ${isOverride ? '<span class="override-badge">override</span>' : ''}
        </div>`
      ).join('');
    }
  }

  // Save name button — persists this person's LSO name
  inner.querySelector('#lsoSaveNameBtn').addEventListener('click', function() {
    const lsoNames = getLSONames();
    const val = document.getElementById('lsoName').value.trim();
    if (val) lsoNames[key] = val;
    else delete lsoNames[key];
    saveLSONames(lsoNames);
    // Update tile
    const hint = document.getElementById('lsoNameHint');
    hint.textContent = `✓ saved for ${name}`;
    hint.style.color = '#22a85a';
    setTimeout(() => { hint.textContent = `saved for ${name}`; hint.style.color = ''; }, 2000);
    renderTiles(currentGroupMap, currentNames);
  });

  inner.querySelector('#emailLSOToggle').addEventListener('click', function() {
    const panel = document.getElementById('lsoPanel');
    const isVisible = panel.classList.toggle('visible');
    this.textContent = isVisible ? '✕ Close' : '✉ Email LSO';
    if (isVisible) { refreshEmail(); panel.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  });

  ['lsoName','lsoDomain','lsoCC'].forEach(id => {
    inner.querySelector('#'+id).addEventListener('input', refreshEmail);
  });

  inner.querySelector('#lsoOpenBtn').addEventListener('click', () => {
    if (!lastEmail) return;
    const { subject, body, teacherEmails, cc } = lastEmail;
    const mailto = `mailto:${teacherEmails.join(';')}?cc=${encodeURIComponent(cc)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.location.href = mailto;
  });

  inner.querySelector('#lsoCopyBodyBtn').addEventListener('click', function() {
    if (!lastEmail) return;
    navigator.clipboard.writeText(lastEmail.body).then(() => {
      this.textContent = '✅ Copied!';
      setTimeout(() => this.textContent = '📋 Copy Body', 1800);
    });
  });

  inner.querySelector('#lsoCopySubjectBtn').addEventListener('click', function() {
    if (!lastEmail) return;
    navigator.clipboard.writeText(lastEmail.subject).then(() => {
      this.textContent = '✅ Copied!';
      setTimeout(() => this.textContent = '📋 Copy Subject', 1800);
    });
  });

  inner.querySelector('#copyAllBtn').addEventListener('click', function() {
    const btn = this;
    const text = [1,2,3,4,5,6].map(p=>{
      const ent=slots[p];
      if(!ent||ent.length===0)return`P${p} - \t\t`;
      return ent.map(({d1,d2,d3})=>`P${p} - ${d1}\t${d2}\t${d3}`).join('\n');
    }).join('\n');
    navigator.clipboard.writeText(text).then(()=>flash(btn)).catch(()=>{
      const ta=Object.assign(document.createElement('textarea'),{value:text,style:'position:fixed;opacity:0'});
      document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);flash(btn);
    });
  });

  inner.addEventListener('click', e => {
    const cell = e.target.closest('.cell-data:not(.empty)'); if (!cell) return;
    const text = cell.dataset.copy; if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      cell.classList.add('flash-copy');
      setTimeout(()=>cell.classList.remove('flash-copy'),1200);
    }).catch(()=>{});
  });
}

function flash(btn){const orig=btn.textContent;btn.textContent='✓ Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},2000);}

loadTimetable();
</script>
